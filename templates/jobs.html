{% extends "base.html" %}
{% block title %}Jobs, die zu dir passen — Work Mentor{% endblock %}
{% block body %}
<div class="container" id="app">
    <header class="jobs-header">
        <a href="/ergebnis" class="back-link">← Zurück</a>
    </header>

    <section class="jobs-hero">
        <h1>Jobs, die zu dir passen.</h1>
        <p class="subline">Basierend auf deinem Karriere-Profil.</p>
    </section>

    <section id="jobsSection">
        <div style="text-align: center; padding: 60px 0;">
            <p style="color: var(--text-muted);">Lade passende Jobs...</p>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script>
const data = (() => { try { return JSON.parse(sessionStorage.getItem('wm_result') || 'null'); } catch(e){ return null; } })();

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function formatSalary(s) {
    if (!s || s === 'Variabel') return s;
    const parts = s.split(' - ');
    if (parts.length === 2) return `€${parts[0].trim()} – €${parts[1].trim()}`;
    return s;
}

function getMatchBadge(match) {
    const cls = match >= 80 ? 'match-badge--high' : 'match-badge--mid';
    return `<span class="match-badge ${cls}">${match}% Match</span>`;
}

function jobCard(job, i) {
    return `
        <div class="job-card animate-in animate-in--d${Math.min((i||0)+1,6)}">
            <div class="job-card-top">
                <div class="job-title">${esc(job.title)}</div>
                ${getMatchBadge(job.match)}
            </div>
            <div class="job-desc">${esc(job.desc)}</div>
            <div class="job-divider"></div>
            <div class="job-card-bottom">
                <div class="job-salary">${esc(formatSalary(job.salary))}</div>
                <a href="#" class="job-check-link" data-title="${esc(job.title)}" data-match="${job.match}">
                    Passe ich wirklich dahin? →
                </a>
            </div>
        </div>`;
}

function wireJobLinks() {
    document.querySelectorAll('.job-check-link[data-title]').forEach(a => {
        if (a._wired) return; a._wired = true;
        a.addEventListener('click', (e) => {
            e.preventDefault();
            sessionStorage.setItem('wm_selected_job', JSON.stringify({
                name: a.dataset.title, match: parseInt(a.dataset.match, 10)
            }));
            window.location.href = '/fit-intro';
        });
    });
}

function loadingHtml(text) {
    return `<div style="text-align:center; padding:56px 0; color:var(--text-muted);">
        <div class="loading-pulse" style="margin:0 auto 18px;"></div>
        ${esc(text)}
    </div>`;
}

function noResult() {
    document.getElementById('jobsSection').innerHTML = `
        <div style="text-align: center; padding: 60px 0;">
            <h2 style="font-size: 24px; font-weight: 600; margin-bottom: 12px;">Noch kein Ergebnis</h2>
            <p style="color: var(--text-secondary); margin-bottom: 24px;">Mach erst den Karriere-Check.</p>
            <a href="/assessment" class="btn btn-primary">Karriere-Check starten →</a>
        </div>`;
}

// Cache an das aktuelle Profil gebunden — neuer Test (anderes Profil) invalidiert.
function jobsCacheSig() {
    return JSON.stringify(data.normalized_scores || data.scores || {});
}
function getCachedJobs() {
    try {
        const c = JSON.parse(sessionStorage.getItem('wm_jobs') || 'null');
        if (c && c.sig === jobsCacheSig() && Array.isArray(c.jobs) && c.jobs.length) return c.jobs;
    } catch(e) {}
    return null;
}
function setCachedJobs(jobs) {
    try { sessionStorage.setItem('wm_jobs', JSON.stringify({ sig: jobsCacheSig(), jobs: jobs })); } catch(e) {}
}

function renderJobsSection(jobs) {
    document.getElementById('jobsSection').innerHTML = `
        <div class="jobs-list">${jobs.map(jobCard).join('')}</div>

        <div class="oder-section">
            <div class="oder-divider"><span>ODER</span></div>
            <div class="custom-job-card">
                <div class="custom-job-title">Ich hab einen anderen Job im Kopf</div>
                <input type="text" class="custom-job-input" id="customJobInput" placeholder="z. B. Vertriebsleiter, Erzieherin …">
                <button class="custom-job-btn" id="customJobBtn">Checken →</button>
                <div id="customResult"></div>
            </div>
        </div>

        <div class="footer-links">
            <a href="#">Impressum</a> · <a href="#">Datenschutz</a>
        </div>`;

    wireJobLinks();
    document.getElementById('customJobBtn').addEventListener('click', checkCustomJob);
    const cInput = document.getElementById('customJobInput');
    const cBtn = document.getElementById('customJobBtn');
    cInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkCustomJob(); });
    cInput.addEventListener('input', () => { cBtn.classList.toggle('active', cInput.value.trim().length > 0); });
}

async function loadJobs(forceRefresh) {
    const section = document.getElementById('jobsSection');

    if (!forceRefresh) {
        const cached = getCachedJobs();
        if (cached) { renderJobsSection(cached); return; }
    }

    section.innerHTML = loadingHtml('Wir suchen Jobs, die zu deinem Profil passen …');
    let result;
    try {
        const resp = await fetch('/api/jobs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ scores: data.normalized_scores || data.scores, code: data.code || 'EA' })
        });
        result = await resp.json();
    } catch(e) { result = { error: e.message }; }

    if (!result || result.error || !result.jobs || !result.jobs.length) {
        section.innerHTML = `
            <div style="padding: 40px 0; text-align: center;">
                <p style="color: var(--text-secondary); margin-bottom: 16px;">Konnte die Jobs gerade nicht laden.</p>
                <button class="btn btn-primary" onclick="loadJobs(true)">Nochmal versuchen</button>
            </div>`;
        return;
    }

    setCachedJobs(result.jobs);
    renderJobsSection(result.jobs);
}

async function checkCustomJob() {
    const input = document.getElementById('customJobInput');
    const val = (input.value || '').trim();
    if (!val) return;
    const btn = document.getElementById('customJobBtn');
    const out = document.getElementById('customResult');
    btn.disabled = true; btn.textContent = 'Wird geprüft …';
    out.innerHTML = '';

    let result;
    try {
        const resp = await fetch('/api/jobs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ scores: data.normalized_scores || data.scores, code: data.code || 'EA', custom_job: val })
        });
        result = await resp.json();
    } catch(e) { result = { error: e.message }; }

    btn.disabled = false; btn.textContent = 'Checken →';

    if (!result || result.error || !result.jobs || !result.jobs.length) {
        out.innerHTML = `<p style="color:var(--text-muted); font-size:13px; margin-top:12px;">Konnte gerade keinen Fit berechnen. Versuch's nochmal.</p>`;
        return;
    }
    out.innerHTML = `<div style="margin-top:16px;">${jobCard(result.jobs[0], 0)}</div>`;
    wireJobLinks();
}

if (!data || !data.scores) {
    noResult();
} else {
    loadJobs();
}
</script>

<style>
.jobs-header {
    padding: 20px 0 8px;
}

.back-link {
    font-size: 15px;
    color: var(--text-secondary);
    text-decoration: none;
    font-weight: 500;
}

.back-link:hover {
    color: var(--text-primary);
}

.jobs-hero {
    padding: 32px 0 28px;
}

.jobs-hero h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    line-height: 1.15;
}

.jobs-hero .subline {
    font-size: 15px;
    color: var(--text-secondary);
}

.jobs-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
}

.job-card {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 20px 20px 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}

.job-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
}

.job-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
}

.match-badge {
    font-size: 13px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 100px;
    white-space: nowrap;
    flex-shrink: 0;
}

.match-badge--high {
    background: #D1FAE5;
    color: #065F46;
}

.match-badge--mid {
    background: #FDE8D8;
    color: #9A3412;
}

.job-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.55;
    margin-bottom: 14px;
}

.job-divider {
    height: 1px;
    background: var(--border-light, #E5E7EB);
    margin-bottom: 12px;
}

.job-card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
}

.job-salary {
    font-size: 13px;
    color: var(--text-muted, #9CA3AF);
    font-weight: 500;
}

.job-check-link {
    font-size: 14px;
    font-weight: 600;
    color: #1E3A5F;
    text-decoration: none;
    white-space: nowrap;
}

.job-check-link:hover {
    text-decoration: underline;
}

/* ODER section */
.oder-section {
    margin-bottom: 40px;
}

.oder-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
    color: var(--text-muted, #9CA3AF);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
}

.oder-divider::before,
.oder-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-light, #E5E7EB);
}

.custom-job-card {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.custom-job-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
}

.custom-job-input {
    width: 100%;
    border: 1.5px solid var(--border-light, #E5E7EB);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    color: var(--text-primary);
    background: #FAFAFA;
    outline: none;
    box-sizing: border-box;
    font-family: inherit;
}

.custom-job-input:focus {
    border-color: #9CA3AF;
}

.custom-job-input::placeholder {
    color: var(--text-muted, #9CA3AF);
}

.custom-job-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    background: #E5E7EB;
    color: #6B7280;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s, color 0.2s;
}

.custom-job-btn.active {
    background: var(--accent);
    color: #FFFFFF;
}

.custom-job-btn.active:not(:disabled):hover {
    background: var(--accent-hover);
}

.custom-job-btn:not(.active):not(:disabled):hover {
    background: #D1D5DB;
}

.footer-links {
    text-align: center;
    padding-bottom: 40px;
    font-size: 13px;
    color: var(--text-muted);
}

.footer-links a {
    color: var(--text-muted);
    text-decoration: underline;
}



</style>
{% endblock %}
