<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Work Mentor{% endblock %}</title>
    <meta name="description" content="Finde raus welcher Job wirklich zu dir passt. Wissenschaftlich fundiert. 5 Minuten. Kostenlos.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Work Mentor — Finde deinen Karriere-Typ">
    <meta property="og:description" content="Wissenschaftlich fundiert. 5 Minuten. Kostenlos.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://work-mentor.com">
    
    <!-- Geist (Body, wie im Design-System) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/style.css">

    {% block head %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
