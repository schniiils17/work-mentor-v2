{% extends "base.html" %}
{% block title %}Dein vollständiges Ergebnis — Work Mentor{% endblock %}

{% block head %}
<style>
.premium-screen { min-height: 100dvh; background: var(--bg); padding-top: 56px; padding-bottom: 48px; }
.premium-topbar { padding: 10px 20px 0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.premium-logo { display: inline-flex; align-items: center; gap: 6px; font-size: 15px; font-weight: 600; color: var(--text-primary); }
.premium-logo-mark { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--text-primary); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
.unlocked-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: var(--radius-full); background: #E7F0EB; color: #2D6A4F; font-size: 11px; font-weight: 600; }

.score-arc-wrap { display: flex; justify-content: center; position: relative; height: 170px; }
.score-arc-inner { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 12px; }
.score-number { font-size: 58px; font-weight: 700; letter-spacing: -0.04em; line-height: 1; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.score-pct { font-size: 24px; color: var(--text-muted); font-weight: 500; }
.score-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-top: 6px; }

.rep-head { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.rep-head span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; }
</style>
{% endblock %}

{% block body %}
<div class="container premium-screen" id="premiumScreen">
    <div style="text-align:center;padding:80px 0;color:var(--text-muted);">Lade Report…</div>
</div>
{% endblock %}

{% block scripts %}
<script>
const fitData = JSON.parse(sessionStorage.getItem('wm_fit_result') || 'null');
const wmResult = JSON.parse(sessionStorage.getItem('wm_result') || '{}');
const wmInsight = sessionStorage.getItem('wm_insight') || '';

if (!fitData) {
    document.getElementById('premiumScreen').innerHTML = `
        <div style="text-align:center;padding:80px 20px;">
            <p style="color:var(--text-muted);margin-bottom:24px;">Kein Ergebnis gefunden.</p>
            <a href="/assessment" class="btn btn-primary">Karriere-Check starten →</a>
        </div>`;
} else {
    try {
        renderPremium(fitData);
    } catch(e) {
        console.error('[WM] renderPremium error:', e);
        document.getElementById('premiumScreen').innerHTML = `
            <div style="padding:90px 24px;text-align:center;">
                <div style="font-size:17px;font-weight:600;color:var(--text-primary);margin-bottom:8px;">Das hat gerade nicht geklappt.</div>
                <p style="color:var(--text-muted);font-size:14px;line-height:1.5;margin:0 0 24px;">Probier's einfach nochmal.</p>
                <button class="btn btn-primary" onclick="sessionStorage.removeItem('wm_fit_result'); window.location.href='/teaser';">Nochmal versuchen →</button>
            </div>`;
    }
}

function buildScoreArcSVG(score) {
    const R = 76, CX = 100, CY = 100, START = 225, SWEEP = 270;
    function polar(deg) { const r = (deg-90)*Math.PI/180; return [CX+R*Math.cos(r), CY+R*Math.sin(r)]; }
    function arcPath(a, b) { const [x1,y1]=polar(a),[x2,y2]=polar(b); return `M ${x1} ${y1} A ${R} ${R} 0 ${(b-a)>180?1:0} 1 ${x2} ${y2}`; }
    const progress = Math.min(1, score/100);
    const color = score >= 70 ? '#2D6A4F' : '#A86A2D';
    return `<svg width="200" height="200" viewBox="0 0 200 200">
        <path d="${arcPath(START,START+SWEEP)}" fill="none" stroke="#EFEDE6" stroke-width="12" stroke-linecap="round"/>
        <path d="${arcPath(START,START+SWEEP*progress)}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round"/>
    </svg>`;
}

function iconSvg(name, color) {
    const icons = {
        check: '<polyline points="20 6 9 17 4 12"/>',
        book: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
        bookmark: '<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>',
        arrowright: '<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>',
        target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
        zap: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
        route: '<circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/>',
        compass: '<circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>',
        battery: '<rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11"/><line x1="5" y1="10" x2="5" y2="14"/>',
        message: '<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>',
        chart: '<path d="M3 3v18h18"/><path d="M18 9l-5 5-3-3-4 4"/>',
        mappin: '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',
        trendingup: '<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>',
    };
    const paths = icons[name] || icons.check;
    return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
}

function badgeMeta(b) {
    return b === 'passt_gut' ? {c:'#2D6A4F', bg:'#E7F0EB', l:'Passt gut'}
         : b === 'dein_hebel' ? {c:'#A86A2D', bg:'#F5EDE0', l:'Dein Hebel'}
         : {c:'#6B6B6B', bg:'#EFEDE6', l:'Solide Basis'};
}

function renderPremium(data) {
    const jobName = data.job_name || 'dein Zieljob';
    const score = data.fit_score || 67;
    const ACC = 'var(--accent)';
    const INK = '#141414';

    const head = (icon, color, label) =>
        `<div class="rep-head">${iconSvg(icon, color)}<span style="color:${color};">${label}</span></div>`;

    // ── Markt: leiser Beleg am Ende statt dominantem Panel ──
    const m = data.markt || {};
    const marketLine = (m.offene_stellen != null) ?
        `<p style="font-size:12.5px;color:var(--text-muted);text-align:center;line-height:1.6;margin:0;">
            <strong style="color:var(--text-secondary);font-variant-numeric:tabular-nums;">${Number(m.offene_stellen).toLocaleString('de-DE')}</strong> offene Stellen bundesweit${m.quereinstieg_moeglich?' · Quereinstieg möglich':''}${(m.regionen && m.regionen.length)?' · '+m.regionen.slice(0,3).join(' · '):''}<br>
            <span style="font-size:11px;">Rückenwind, kein Engpass · Quelle: Bundesagentur für Arbeit</span>
        </p>` : '';
    const wegeLight = (data.einstiegswege || []).map((w,i,arr) =>
        `<div style="display:flex;gap:11px;align-items:flex-start;padding:12px 0;${i<arr.length-1?'border-bottom:1px solid var(--border-light);':''}">
            <span style="width:20px;height:20px;border-radius:50%;flex-shrink:0;margin-top:1px;background:var(--bg-soft);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;">${i+1}</span>
            <div><div style="font-size:13.5px;font-weight:500;color:var(--text-primary);margin-bottom:1px;">${w.name}</div><div style="font-size:12px;color:var(--text-secondary);line-height:1.4;">${w.detail||''}</div></div>
        </div>`).join('');

    // ── Anforderungen (volle Karten, Badge-Rand) ──
    const reqs = (data.requirements || []).map(r => {
        const b = badgeMeta(r.badge);
        return `<div style="background:var(--bg-card);border:1px solid var(--border-light);border-left:3px solid ${b.c};border-radius:16px;padding:14px 16px;">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:7px;">
                <span style="font-size:14.5px;font-weight:500;color:var(--text-primary);flex:1;">${r.name}</span>
                <span style="padding:4px 10px;border-radius:100px;background:${b.bg};color:${b.c};font-size:11px;font-weight:500;white-space:nowrap;">${b.l}</span>
            </div>
            <p style="font-size:13px;color:var(--text-secondary);margin:0;line-height:1.45;">${r.body||''}</p>
        </div>`;
    }).join('');

    // ── Stärken (grüne Karte) ──
    const strengths = (data.strengths && data.strengths.length) ? data.strengths : (data.strength ? [data.strength] : []);
    const strengthsHtml = strengths.map((s,i) =>
        `<div style="padding:14px 0;${i<strengths.length-1?'border-bottom:1px solid rgba(13,148,136,0.15);':''}">
            <div style="font-size:14.5px;font-weight:500;color:var(--text-primary);margin-bottom:3px;">${s.name||''}</div>
            <div style="font-size:13px;color:var(--text-secondary);line-height:1.45;">${s.body||''}</div>
        </div>`).join('');

    const lever = data.lever || {};
    const leverObs = lever.observation || lever.body || '';
    const leverEdge = lever.edge || '';
    const res = data.resource || {};

    // ── Schritte: ab heute machbar, ohne Annahme über die aktuelle Situation ──
    const steps = data.schritte || data.fahrplan || [];
    const schritteHtml = steps.map((f,i,arr) =>
        `<div style="display:flex;gap:14px;padding-bottom:${i===arr.length-1?0:18}px;">
            <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;">
                <div style="width:30px;height:30px;border-radius:50%;background:${ACC};color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;">${i+1}</div>
                ${i===arr.length-1?'':`<div style="width:2px;flex:1;background:var(--border-light);margin-top:4px;min-height:24px;"></div>`}
            </div>
            <div style="padding-top:4px;flex:1;">
                <div style="font-size:15px;font-weight:500;color:var(--text-primary);margin-bottom:3px;">${f.title||''}</div>
                <p style="font-size:13px;color:var(--text-secondary);margin:0;line-height:1.45;">${f.body||''}</p>
            </div>
        </div>`).join('');

    const depthCard = (icon,title,body) =>
        `<div style="background:var(--bg-card);border:1px solid var(--border-light);border-radius:16px;padding:16px;">
            <div style="display:flex;align-items:center;gap:9px;margin-bottom:8px;">
                <span style="width:28px;height:28px;border-radius:8px;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;">${iconSvg(icon,ACC)}</span>
                <span style="font-size:14px;font-weight:500;color:var(--text-primary);">${title}</span>
            </div>
            <p style="font-size:13px;color:var(--text-secondary);margin:0;line-height:1.5;">${body||''}</p>
        </div>`;

    document.getElementById('premiumScreen').innerHTML = `
        <div class="premium-topbar">
            <span class="premium-logo"><span class="premium-logo-mark">M</span> Work Mentor</span>
            <span class="unlocked-pill">${iconSvg('check','#2D6A4F')} Dein voller Report</span>
        </div>

        ${wmInsight ? `<div style="margin:0 20px 22px;padding:18px 20px;background:var(--bg-card);border:1px solid var(--border-light);border-left:3px solid var(--accent);border-radius:var(--radius);"><div style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);font-weight:700;margin-bottom:8px;">Das bist du</div><p style="font-size:17px;line-height:1.4;color:var(--text-primary);font-weight:500;margin:0;">${wmInsight}</p></div>` : ''}

        <div style="padding:0 20px;">
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-muted);text-align:center;margin-bottom:14px;">${jobName} · Wo du gerade stehst</div>

            <div class="score-arc-wrap">
                ${buildScoreArcSVG(score)}
                <div class="score-arc-inner"><div class="score-number">${score}<span class="score-pct">%</span></div><div class="score-label">FIT</div></div>
            </div>
            <p style="font-size:18px;font-weight:600;color:var(--text-primary);text-align:center;margin:12px auto 30px;max-width:300px;line-height:1.3;">${data.fit_headline||''}</p>

            <!-- ── Die eine Sache (Herzstück, Coach-Stimme) ── -->
            <div style="background:${ACC};color:#fff;border-radius:18px;padding:22px;margin-bottom:14px;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">${iconSvg('zap','#fff')}<span style="font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:rgba(255,255,255,0.7);">Die eine Sache</span></div>
                <div style="font-size:19px;font-weight:600;margin:0 0 10px;line-height:1.25;">${lever.name||''}</div>
                <p style="font-size:14px;color:rgba(255,255,255,0.92);margin:0 0 ${leverEdge?'12px':'0'};line-height:1.55;">${leverObs}</p>
                ${leverEdge ? `<p style="font-size:14px;color:rgba(255,255,255,0.92);margin:0;line-height:1.55;">${leverEdge}</p>` : ''}
            </div>

            ${res.title ? `<div style="margin-bottom:30px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:18px;padding:16px;display:flex;align-items:flex-start;gap:13px;">
                <div style="width:40px;height:40px;border-radius:10px;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;">${iconSvg('book',ACC)}</div>
                <div style="flex:1;min-width:0;">
                    <div style="font-size:10.5px;color:var(--text-muted);letter-spacing:0.08em;margin-bottom:3px;">HILFT DIR GENAU DABEI</div>
                    <div style="font-size:14.5px;font-weight:500;color:var(--text-primary);margin-bottom:2px;">${res.title}</div>
                    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:7px;">${res.author||''}${res.price?' · '+res.price:''}</div>
                    <p style="font-size:12.5px;color:var(--text-secondary);margin:0 0 10px;line-height:1.4;">${res.body||''}</p>
                    <button style="font-size:12.5px;font-weight:500;color:${ACC};display:inline-flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-family:var(--font);padding:0;">${res.cta||'Auf Amazon ansehen'} ${iconSvg('arrowright',ACC)}</button>
                </div>
            </div>` : '<div style="margin-bottom:16px;"></div>'}

            ${schritteHtml ? head('route','var(--text-primary)','So übst du das — ab heute') : ''}
            ${schritteHtml ? `<div style="margin-bottom:30px;">${schritteHtml}</div>` : ''}

            ${head('check','#2D6A4F','Wo du stark bist')}
            <div style="background:#E7F0EB;border-radius:18px;padding:6px 16px;margin-bottom:30px;">${strengthsHtml}</div>

            ${head('target','var(--text-primary)','Das braucht der Job')}
            <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:30px;">${reqs}</div>

            ${(data.tick||data.drain||data.positionierung) ? head('compass','var(--text-primary)','Tiefer geschaut') : ''}
            <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:30px;">
                ${data.tick ? depthCard('zap','Wie du in diesem Job tickst', data.tick) : ''}
                ${data.drain ? depthCard('battery','Was dich hier auslaugen würde', data.drain) : ''}
                ${data.positionierung ? depthCard('message','Wie du dich im Gespräch positionierst', data.positionierung) : ''}
            </div>

            ${wegeLight ? head('route','var(--text-primary)','So kommst du rein') : ''}
            ${wegeLight ? `<div style="background:var(--bg-card);border:1px solid var(--border-light);border-radius:18px;padding:4px 16px;margin-bottom:18px;">${wegeLight}</div>` : ''}

            ${marketLine ? `<div style="margin-bottom:30px;">${marketLine}</div>` : ''}

            <div style="display:flex;flex-direction:column;gap:8px;">
                <button class="btn btn-primary" onclick="alert('PDF-Download kommt bald.')">${iconSvg('bookmark','#fff')}&nbsp; Als PDF speichern</button>
                <button class="btn btn-secondary" onclick="window.location.href='/jobs'">Anderen Job testen</button>
            </div>
        </div>
    `;
}
</script>
{% endblock %}
