{% extends "base.html" %}
{% block title %}Story-Karte — Work Mentor{% endblock %}
{% block body %}
<div class="container" id="app">
    <header class="header">
        <a href="/ergebnis" class="back-link">← Zurück zu meinem Ergebnis</a>
    </header>
    
    <div class="section-label">Story-Karte · 9:16</div>
    
    <div class="story-card-container" id="storyContainer">
        <!-- JS renders -->
    </div>
    
    <div class="action-buttons" id="actionButtons">
        <!-- JS renders -->
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const TIERS = {
    R: { name: "Der Wolf",    svg: "/static/img/wolf.svg",    color: "#475569", quote: "Ich rede nicht drüber. Ich mach's einfach.",           superkraft: "Aus dem Nichts etwas Funktionierendes bauen — bevor andere überhaupt verstanden haben, wie das Problem aussieht.", kryptonit: "Endlose Meetings, in denen geredet wird statt gemacht." },
    I: { name: "Die Eule",    svg: "/static/img/eule.svg",    color: "#4338CA", quote: "Ich seh, was andere übersehen.",                        superkraft: "Muster erkennen, wo andere nur Chaos sehen — und das so erklären, dass es plötzlich offensichtlich wirkt.",    kryptonit: "Jemand sagt 'Glaub mir einfach' ohne Daten zu zeigen." },
    A: { name: "Der Fuchs",   svg: "/static/img/fuchs.svg",   color: "#F59E0B", quote: "Die besten Ideen passen in keine Box.",                   superkraft: "Bestehende Ideen so neu kombinieren, dass alle denken: Klar, warum hat das nicht schon jemand gemacht?",               kryptonit: "Eine Vorlage in PowerPoint, die du ausfüllen sollst." },
    S: { name: "Der Delphin", svg: "/static/img/delphin.svg", color: "#0D9488", quote: "Menschen sind mein Projekt.",                              superkraft: "Eine Gruppe so führen, dass sich jeder einzelne gesehen fühlt — und am Ende mehr leistet als gedacht.",  kryptonit: "Allein in einem Co-Working zwischen 30 Headphones." },
    E: { name: "Der Adler",   svg: "/static/img/adler.svg",   color: "#EA580C", quote: "Wo andere Risiko sehen, seh ich Chancen.",                 superkraft: "Leute begeistern, bevor du selbst weißt, wovon du redest.",                                                         kryptonit: "Jemand sagt: Das haben wir schon immer so gemacht." },
    C: { name: "Der Oktopus", svg: "/static/img/oktopus.svg", color: "#7C3AED", quote: "Der Plan steht. Immer.",                                   superkraft: "Aus Datenchaos eine saubere Struktur machen, die so logisch wirkt, als wäre sie schon immer da gewesen.",           kryptonit: "Lass uns das spontan entscheiden." }
};

function render() {
    const data = JSON.parse(sessionStorage.getItem('wm_result') || '{}');
    
    if (!data || !data.code) {
        document.getElementById('storyContainer').innerHTML = '<p style="text-align:center;padding:40px;color:#999;">Kein Ergebnis gefunden. <a href="/assessment">Zum Check</a></p>';
        return;
    }
    
    const topKey = data.code ? data.code[0] : 'E';
    const tier = TIERS[topKey];
    
    document.getElementById('storyContainer').innerHTML = `
        <div class="story-card" style="background: ${tier.color};">
            <img src="${tier.svg}" alt="" style="position:absolute;right:-20px;bottom:10%;width:65%;opacity:0.08;z-index:0;pointer-events:none;">
            <div class="story-card-header">
                <span class="story-card-brand">WORK MENTOR</span>
            </div>
            
            <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                <img class="story-card-illustration" src="${tier.svg}" alt="${tier.name}" style="width: 120px; height: auto; margin: 0 auto; display: block; ">
                <h2 class="story-card-name">${tier.name}.</h2>
                <p class="story-card-quote">${tier.quote}</p>
            </div>
            
            <div>
                <div class="story-card-trait">
                    <div class="story-card-trait-label">⚡ SUPERKRAFT</div>
                    <div class="story-card-trait-text">${tier.superkraft}</div>
                </div>
                <div class="story-card-trait" style="margin-top: 8px;">
                    <div class="story-card-trait-label">💀 KRYPTONIT</div>
                    <div class="story-card-trait-text">${tier.kryptonit}</div>
                </div>
            </div>
            
            <div class="story-card-footer">
                <span>Finde dein Tier</span>
                <span>workmentor.com</span>
            </div>
        </div>
    `;
    
    document.getElementById('actionButtons').innerHTML = `
        <button class="action-btn-primary" style="background: ${tier.color};" onclick="shareStory()">↑ In Story posten</button>
        <button class="action-btn-secondary" onclick="saveStory()">✓ Speichern</button>
    `;
}

function shareStory() {
    if (navigator.share) {
        navigator.share({
            title: 'Mein Karriere-Tier — Work Mentor',
            text: 'Finde raus welcher Arbeitstyp du wirklich bist!',
            url: 'https://workmentor.com'
        });
    } else {
        navigator.clipboard.writeText('https://workmentor.com');
        alert('Link kopiert!');
    }
}

function saveStory() {
    alert('Screenshot-Funktion kommt bald!');
}

render();
</script>
{% endblock %}
