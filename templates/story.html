{% extends "base.html" %}
{% block title %}Story-Karte — Work Mentor{% endblock %}
{% block body %}
<div class="container" id="app">
    <header class="header">
        <a href="/ergebnis" class="back-link">← Zurück zu meinem Ergebnis</a>
    </header>
    
    <div class="section-label">Story-Karte · 9:16</div>
    
    <div class="story-card-container" id="storyContainer">
        <!-- JS renders -->
    </div>
    
    <div class="action-buttons" id="actionButtons">
        <!-- JS renders -->
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const TIERS = {
    R: { name: "Der Wolf", svg: "/static/img/wolf.svg", color: "#9CA3AF", quote: "Weniger reden. Mehr machen.", superkraft: "Dinge zum Laufen bringen, die andere nur besprechen.", kryptonit: "Stundenlange Meetings, in denen nichts passiert." },
    I: { name: "Die Eule", svg: "/static/img/eule.svg", color: "#3B82F6", quote: "Warum? ist vermutlich deine Lieblingsfrage.", superkraft: "Zusammenh\u00e4nge sehen, die anderen entgehen.", kryptonit: "Entscheidungen treffen, wenn die Datenlage d\u00fcnn ist." },
    A: { name: "Der Fuchs", svg: "/static/img/fuchs.svg", color: "#F59E0B", quote: "Wahrscheinlich hast du schon drei Ideen, bevor andere das Problem sehen.", superkraft: "L\u00f6sungen finden, an die sich noch keiner rangetraut hat.", kryptonit: "Starre Prozesse, in denen Kreativit\u00e4t keinen Platz hat." },
    S: { name: "Der Delphin", svg: "/static/img/delphin.svg", color: "#14B8A6", quote: "Du sp\u00fcrst wahrscheinlich schnell, wie es anderen geht.", superkraft: "Räume schaffen, in denen sich Menschen öffnen.", kryptonit: "Situationen, in denen niemand ehrlich miteinander redet." },
    E: { name: "Der Adler", svg: "/static/img/adler.svg", color: "#E85A1A", quote: "Wo andere Z\u00f6gern sehen, siehst du vermutlich Chancen.", superkraft: "Andere f\u00fcr eine Idee begeistern \u2014 noch bevor der Plan steht.", kryptonit: "Wenn jemand sagt: Das haben wir schon immer so gemacht." },
    C: { name: "Der Oktopus", svg: "/static/img/oktopus.svg", color: "#8B5CF6", quote: "Du bist vermutlich die Person, die den \u00dcberblick beh\u00e4lt, wenn alle anderen ihn verlieren.", superkraft: "Chaos in Struktur verwandeln \u2014 ohne dass es jemand merkt.", kryptonit: "Wenn alle einfach mal schauen wollen, statt einen Plan zu machen." }
};

function render() {
    const data = JSON.parse(sessionStorage.getItem('wm_result') || '{}');
    
    if (!data || !data.code) {
        document.getElementById('storyContainer').innerHTML = '<p style="text-align:center;padding:40px;color:#999;">Kein Ergebnis gefunden. <a href="/assessment">Zum Check</a></p>';
        return;
    }
    
    const topKey = data.code ? data.code[0] : 'E';
    const tier = TIERS[topKey];
    
    document.getElementById('storyContainer').innerHTML = `
        <div class="story-card" style="background: ${tier.color};">
            <img src="${tier.svg}" alt="" style="position:absolute;right:-20px;bottom:10%;width:65%;opacity:0.08;z-index:0;pointer-events:none;">
            <div class="story-card-header">
                <span class="story-card-brand">WORK MENTOR</span>
            </div>
            
            <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                <img class="story-card-illustration" src="${tier.svg}" alt="${tier.name}" style="width: 120px; height: auto; margin: 0 auto; display: block; ">
                <h2 class="story-card-name">${tier.name}.</h2>
                <p class="story-card-quote">${tier.quote}</p>
            </div>
            
            <div>
                <div class="story-card-trait">
                    <div class="story-card-trait-label">⚡ SUPERKRAFT</div>
                    <div class="story-card-trait-text">${tier.superkraft}</div>
                </div>
                <div class="story-card-trait" style="margin-top: 8px;">
                    <div class="story-card-trait-label">💀 KRYPTONIT</div>
                    <div class="story-card-trait-text">${tier.kryptonit}</div>
                </div>
            </div>
            
            <div class="story-card-footer">
                <span>Finde dein Tier</span>
                <span>workmentor.com</span>
            </div>
        </div>
    `;
    
    document.getElementById('actionButtons').innerHTML = `
        <button class="action-btn-primary" style="background: ${tier.color};" onclick="shareStory()">↑ In Story posten</button>
        <button class="action-btn-secondary" onclick="saveStory()">✓ Speichern</button>
    `;
}

function shareStory() {
    if (navigator.share) {
        navigator.share({
            title: 'Mein Karriere-Tier — Work Mentor',
            text: 'Finde raus welcher Arbeitstyp du wirklich bist!',
            url: 'https://workmentor.com'
        });
    } else {
        navigator.clipboard.writeText('https://workmentor.com');
        alert('Link kopiert!');
    }
}

function saveStory() {
    alert('Screenshot-Funktion kommt bald!');
}

render();
</script>
{% endblock %}
