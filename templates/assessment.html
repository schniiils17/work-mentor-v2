{% extends "base.html" %}

{% block title %}Karriere-Check — Work Mentor{% endblock %}

{% block head %}
<style>
.chat-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.chat-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0;
    -webkit-overflow-scrolling: touch;
}
.chat-messages {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.mentor-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    align-self: flex-start;
    max-width: 88%;
}
.mentor-avatar {
    width: 28px;
    height: 28px;
    min-width: 28px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
}
.chat-bubble {
    padding: 12px 16px;
    font-size: 15px;
    line-height: 1.5;
    animation: fadeInUp 0.3s ease forwards;
}
.chat-bubble.mentor {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 16px 16px 16px 4px;
    color: var(--text-primary);
}
.chat-bubble.user {
    background: var(--accent);
    color: #fff;
    border-radius: 16px 16px 4px 16px;
    align-self: flex-end;
    max-width: 85%;
    padding: 10px 16px;
    font-size: 14px;
}
.typing-indicator {
    display: inline-flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 16px 16px 16px 4px;
}
.typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: typingBounce 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
}

/* ── Quick-Reply Rating ── */
.rating-sheet {
    background: var(--bg);
    border-top: 1px solid var(--border-light);
    padding: 20px 0 28px;
}
.rating-question {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 6px;
}
.rating-statement {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.3;
    margin-bottom: 20px;
    color: var(--text-primary);
}
.rating-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}
.rating-chip {
    flex: 1;
    min-width: 0;
    padding: 12px 4px;
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    text-align: center;
    cursor: pointer;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
}
.rating-chip:hover {
    border-color: var(--accent);
}
.rating-chip:active {
    transform: scale(0.96);
}
.rating-chip.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
}
</style>
{% endblock %}

{% block body %}
<div class="container screen" id="app">
    
    <!-- Header -->
    <header class="header">
        <a href="/" class="logo"><span class="logo-mark">M</span>Work Mentor</a>
        <span class="progress-label" id="itemCounter">1 von 24</span>
    </header>

    <!-- Progress -->
    <div class="progress-section">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 4%"></div>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-wrapper">
        <div class="chat-scroll" id="chatScroll">
            <div class="chat-messages" id="chatMessages">
            </div>
        </div>

        <!-- Rating Chips -->
        <div class="rating-sheet" id="ratingSheet" style="display: none;">
            <div class="rating-question">Wie sehr würde dir das Spaß machen?</div>
            <div class="rating-statement" id="ratingStatement"></div>
            
            <div class="rating-chips">
                <button class="rating-chip" data-value="-2">Nö</button>
                <button class="rating-chip" data-value="-1">Eher nicht</button>
                <button class="rating-chip" data-value="0">Geht so</button>
                <button class="rating-chip" data-value="1">Ja!</button>
                <button class="rating-chip" data-value="2">Voll! 🔥</button>
            </div>
        </div>
    </div>

    <!-- Back -->
    <div style="padding: 8px 0 16px;">
        <span class="back-link" id="backBtn" style="visibility: hidden; cursor: pointer; font-size: 14px; color: var(--text-secondary);" onclick="goBack()">← Zurück</span>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
// Items from backend (24 Likert-Aussagen)
const items = {{ items | tojson }};
let currentIndex = 0;
let answers = [];

const chatMessages = document.getElementById('chatMessages');
const chatScroll = document.getElementById('chatScroll');
const ratingSheet = document.getElementById('ratingSheet');
const ratingStatement = document.getElementById('ratingStatement');

// Magic moments — Mentor kommentiert zwischen den Fragen
const magicMoments = {
    0: ["Schön, dass du da bist! 👋", "Ich zeige dir gleich ein paar Tätigkeiten. Sag mir einfach, wie sehr dir das Spaß machen würde."],
    6: ["Interessant… ich seh schon ein Muster. 🧐"],
    12: ["Halbzeit! Du machst das super. 💪"],
    18: ["Fast geschafft. Die letzten Fragen sind die spannendsten. 🎯"],
};

const valueLabels = {
    '-2': 'Nö',
    '-1': 'Eher nicht',
    '0': 'Geht so',
    '1': 'Ja!',
    '2': 'Voll! 🔥'
};

function scrollToBottom() {
    setTimeout(() => { chatScroll.scrollTop = chatScroll.scrollHeight; }, 50);
}

function addMentorBubble(text, delay) {
    return new Promise(resolve => {
        const typingRow = document.createElement('div');
        typingRow.className = 'mentor-row';
        typingRow.innerHTML = `
            <div class="mentor-avatar">M</div>
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        `;
        chatMessages.appendChild(typingRow);
        scrollToBottom();

        setTimeout(() => {
            typingRow.innerHTML = `
                <div class="mentor-avatar">M</div>
                <div class="chat-bubble mentor">${text}</div>
            `;
            scrollToBottom();
            resolve();
        }, delay || 700);
    });
}

function addUserBubble(text) {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble user';
    bubble.textContent = text;
    chatMessages.appendChild(bubble);
    scrollToBottom();
}

function showRating(item) {
    ratingStatement.textContent = item.text;
    ratingSheet.style.display = 'block';
    
    // Reset buttons
    document.querySelectorAll('.rating-chip').forEach(btn => {
        btn.classList.remove('selected');
    });
    
    // Restore previous answer if going back
    const existing = answers[currentIndex];
    if (existing !== undefined && existing !== null) {
        const btn = document.querySelector(`.rating-chip[data-value="${existing.value}"]`);
        if (btn) btn.classList.add('selected');
    }
    
    scrollToBottom();
}

function hideRating() {
    ratingSheet.style.display = 'none';
}

async function showItem(index) {
    const item = items[index];
    
    // Update UI
    document.getElementById('itemCounter').textContent = `${index + 1} von ${items.length}`;
    document.getElementById('progressFill').style.width = `${((index + 1) / items.length) * 100}%`;
    document.getElementById('backBtn').style.visibility = index > 0 ? 'visible' : 'hidden';
    
    // Magic moment?
    if (magicMoments[index]) {
        for (const msg of magicMoments[index]) {
            await addMentorBubble(msg, 600);
            await new Promise(r => setTimeout(r, 250));
        }
    }
    
    // Show rating
    showRating(item);
}

// Rating chip clicks
document.querySelectorAll('.rating-chip').forEach(btn => {
    btn.addEventListener('click', function() {
        const value = parseInt(this.dataset.value);
        
        // Visual feedback
        document.querySelectorAll('.rating-chip').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        
        // Store
        answers[currentIndex] = {
            item_id: items[currentIndex].id,
            value: value
        };
        
        // Show as user bubble + next
        setTimeout(async () => {
            hideRating();
            addUserBubble(valueLabels[String(value)]);
            
            currentIndex++;
            
            if (currentIndex >= items.length) {
                await submitAssessment();
            } else {
                await showItem(currentIndex);
            }
        }, 200);
    });
});

function goBack() {
    if (currentIndex > 0) {
        currentIndex--;
        // Remove last user bubble
        const bubbles = chatMessages.querySelectorAll('.chat-bubble.user');
        if (bubbles.length) bubbles[bubbles.length - 1].remove();
        showRating(items[currentIndex]);
        document.getElementById('itemCounter').textContent = `${currentIndex + 1} von ${items.length}`;
        document.getElementById('progressFill').style.width = `${((currentIndex + 1) / items.length) * 100}%`;
        document.getElementById('backBtn').style.visibility = currentIndex > 0 ? 'visible' : 'hidden';
    }
}

async function submitAssessment() {
    await addMentorBubble("Perfekt — ich hab alles was ich brauche. 🎯", 700);
    await new Promise(r => setTimeout(r, 400));
    await addMentorBubble("Dein Karriere-Tier wird berechnet…", 600);
    
    try {
        const response = await fetch('/api/assess', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                answers: answers.filter(a => a !== null && a !== undefined)
            })
        });
        
        const result = await response.json();
        sessionStorage.setItem('wm_result', JSON.stringify(result));
        
        setTimeout(() => {
            window.location.href = '/ergebnis';
        }, 1500);
    } catch (error) {
        await addMentorBubble("Ups, da ist was schiefgelaufen. Versuch's nochmal.", 500);
        setTimeout(() => { window.location.href = '/assessment'; }, 2000);
    }
}

// Start
showItem(0);
</script>
{% endblock %}
