{% extends "base.html" %}

{% block title %}Karriere-Check — Work Mentor{% endblock %}

{% block head %}
<style>
.chat-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.chat-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0;
    -webkit-overflow-scrolling: touch;
}
.chat-messages {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.mentor-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    align-self: flex-start;
    max-width: 88%;
}
.mentor-avatar {
    width: 28px;
    height: 28px;
    min-width: 28px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
}
.chat-bubble {
    padding: 12px 16px;
    font-size: 15px;
    line-height: 1.5;
    animation: fadeInUp 0.3s ease forwards;
}
.chat-bubble.mentor {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 16px 16px 16px 4px;
    color: var(--text-primary);
}
.chat-bubble.user {
    background: var(--accent);
    color: #fff;
    border-radius: 16px 16px 4px 16px;
    align-self: flex-end;
    max-width: 85%;
}
.answer-sheet {
    background: var(--bg);
    border-top: 1px solid var(--border-light);
    padding: 16px 0 24px;
}
.answer-sheet-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 10px;
}
.answer-chips {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.answer-chip {
    width: 100%;
    text-align: left;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 12px 16px;
    border-radius: 12px;
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.4;
    color: var(--text-primary);
    cursor: pointer;
    transition: var(--transition);
    -webkit-tap-highlight-color: transparent;
}
.answer-chip:hover {
    border-color: var(--accent);
}
.answer-chip:active, .answer-chip.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
}
.typing-indicator {
    display: inline-flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 16px 16px 16px 4px;
}
.typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: typingBounce 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
}
</style>
{% endblock %}

{% block body %}
<div class="container screen" id="app">
    
    <!-- Header -->
    <header class="header">
        <a href="/" class="logo"><span class="logo-mark">M</span>Work Mentor</a>
        <span class="progress-label" id="questionCounter">1 von 12</span>
    </header>

    <!-- Progress -->
    <div class="progress-section">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 8%"></div>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-wrapper">
        <div class="chat-scroll" id="chatScroll">
            <div class="chat-messages" id="chatMessages">
                <!-- Messages inserted by JS -->
            </div>
        </div>

        <!-- Answer chips -->
        <div class="answer-sheet" id="answerSheet" style="display: none;">
            <div class="answer-sheet-label">Antwort wählen</div>
            <div class="answer-chips" id="answerChips">
                <!-- Chips inserted by JS -->
            </div>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
// ── Questions (12 chat-style RIASEC questions) ──
const questions = [
    {
        id: 1,
        mentor: ["Schön, dass du da bist. 👋", "Ich stelle dir gleich ein paar Situationen vor — antworte einfach mit dem, was am ehesten passt.", "Stell dir vor, du ziehst in eine neue Wohnung. Umzugstag. Was machst du?"],
        answers: [
            { text: "Möbel aufbauen, Löcher bohren, alles selbst machen", riasec: "R" },
            { text: "Erst mal recherchieren: welches Regal passt am besten?", riasec: "I" },
            { text: "Wände streichen, Deko aussuchen, Vibe gestalten", riasec: "A" },
            { text: "Freunde einladen und gemeinsam anpacken", riasec: "S" }
        ]
    },
    {
        id: 2,
        mentor: ["Jetzt mal ehrlich — was wäre für dich der absolute Horror-Job?"],
        answers: [
            { text: "8 Stunden Excel ausfüllen, allein, ohne Kontext", riasec: "E" },
            { text: "Den ganzen Tag Leuten am Telefon was verkaufen", riasec: "I" },
            { text: "Jeden Tag das Gleiche machen, null Abwechslung", riasec: "A" },
            { text: "In ner Gruppe arbeiten wo alle durcheinander reden", riasec: "R" }
        ]
    },
    {
        id: 3,
        magic: "Interessant. Langsam seh ich ein Muster… 🧐",
        mentor: ["Du bekommst ein Projekt mit komplett freier Hand. Was machst du zuerst?"],
        answers: [
            { text: "Prototyp bauen — Learning by Doing", riasec: "R" },
            { text: "Daten sammeln und analysieren", riasec: "I" },
            { text: "Brainstormen und kreative Ansätze skizzieren", riasec: "A" },
            { text: "Team zusammenstellen und Rollen verteilen", riasec: "E" }
        ]
    },
    {
        id: 4,
        mentor: ["Freitagnachmittag, alles erledigt. Was machst du freiwillig?"],
        answers: [
            { text: "An nem Side-Project basteln", riasec: "R" },
            { text: "Einen Artikel oder Podcast zu einem Thema das mich interessiert", riasec: "I" },
            { text: "Etwas Kreatives — zeichnen, Musik, schreiben", riasec: "A" },
            { text: "Mich mit Kollegen treffen oder jemandem helfen", riasec: "S" }
        ]
    },
    {
        id: 5,
        mentor: ["Dein bester Kumpel hat eine Geschäftsidee. Welche Rolle übernimmst du?"],
        answers: [
            { text: "Das Produkt bauen", riasec: "R" },
            { text: "Marktforschung und Zahlen", riasec: "I" },
            { text: "Branding und Design", riasec: "A" },
            { text: "Leute überzeugen und Vertrieb", riasec: "E" }
        ]
    },
    {
        id: 6,
        magic: "Du bist ehrlich mit dir selbst — das ist selten. 💪",
        mentor: ["Was nervt dich am meisten an anderen Menschen im Job?"],
        answers: [
            { text: "Wenn sie nur reden aber nichts umsetzen", riasec: "R" },
            { text: "Wenn sie Entscheidungen ohne Fakten treffen", riasec: "I" },
            { text: "Wenn sie null Kreativität oder Offenheit mitbringen", riasec: "A" },
            { text: "Wenn sie kein Teamgefühl haben", riasec: "S" }
        ]
    },
    {
        id: 7,
        mentor: ["Du musst eine Präsentation halten. Wie bereitest du dich vor?"],
        answers: [
            { text: "Live-Demo vorbereiten — zeigen statt reden", riasec: "R" },
            { text: "Daten und Fakten zusammentragen, Struktur planen", riasec: "I" },
            { text: "Storytelling — es muss sich gut anfühlen", riasec: "A" },
            { text: "Fragen an das Publikum einbauen, interaktiv machen", riasec: "S" }
        ]
    },
    {
        id: 8,
        mentor: ["Welcher Satz beschreibt dich am besten?"],
        answers: [
            { text: "Ich mache lieber als ich plane", riasec: "R" },
            { text: "Ich will verstehen warum etwas funktioniert", riasec: "I" },
            { text: "Regeln sind da um gebrochen zu werden", riasec: "A" },
            { text: "Ich spüre wie es anderen geht", riasec: "S" }
        ]
    },
    {
        id: 9,
        magic: "Fast geschafft. Die letzten Fragen sind die spannendsten. 🎯",
        mentor: ["In der Schule — was hat dir am meisten Spaß gemacht?"],
        answers: [
            { text: "Werken, Sport, praktische Fächer", riasec: "R" },
            { text: "Mathe, Physik, Logik-Rätsel", riasec: "I" },
            { text: "Kunst, Musik, Deutsch-Aufsätze", riasec: "A" },
            { text: "Gruppenarbeiten und Projekte", riasec: "S" }
        ]
    },
    {
        id: 10,
        mentor: ["Du hast 10.000€ geschenkt bekommen. Was machst du damit?"],
        answers: [
            { text: "Werkzeug, Ausrüstung, etwas Handfestes", riasec: "R" },
            { text: "Investieren und Rendite berechnen", riasec: "C" },
            { text: "Reisen, Erlebnisse, Inspiration", riasec: "A" },
            { text: "Ein Business starten", riasec: "E" }
        ]
    },
    {
        id: 11,
        mentor: ["Was ist dir wichtiger im Job?"],
        answers: [
            { text: "Freiheit und Eigenverantwortung", riasec: "E" },
            { text: "Sicherheit und klare Strukturen", riasec: "C" },
            { text: "Sinn und Menschen helfen", riasec: "S" },
            { text: "Abwechslung und neue Herausforderungen", riasec: "A" }
        ]
    },
    {
        id: 12,
        mentor: ["Letzte Frage. Wenn du morgen einen komplett neuen Job anfangen könntest — was zieht dich an?"],
        answers: [
            { text: "Etwas mit den Händen erschaffen", riasec: "R" },
            { text: "Komplexe Probleme lösen", riasec: "I" },
            { text: "Menschen führen und Visionen umsetzen", riasec: "E" },
            { text: "Ordnung in Chaos bringen", riasec: "C" }
        ]
    }
];

let currentQuestion = 0;
let userAnswers = [];
const chatMessages = document.getElementById('chatMessages');
const chatScroll = document.getElementById('chatScroll');
const answerSheet = document.getElementById('answerSheet');
const answerChips = document.getElementById('answerChips');

function scrollToBottom() {
    setTimeout(() => {
        chatScroll.scrollTop = chatScroll.scrollHeight;
    }, 50);
}

function addMentorBubble(text, delay) {
    return new Promise(resolve => {
        // Show typing indicator
        const typingRow = document.createElement('div');
        typingRow.className = 'mentor-row';
        typingRow.innerHTML = `
            <div class="mentor-avatar">M</div>
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        `;
        chatMessages.appendChild(typingRow);
        scrollToBottom();

        setTimeout(() => {
            // Replace typing with actual message
            typingRow.innerHTML = `
                <div class="mentor-avatar">M</div>
                <div class="chat-bubble mentor">${text}</div>
            `;
            scrollToBottom();
            resolve();
        }, delay || 800);
    });
}

function addUserBubble(text) {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble user';
    bubble.textContent = text;
    chatMessages.appendChild(bubble);
    scrollToBottom();
}

function showAnswers(answers) {
    answerChips.innerHTML = '';
    answers.forEach((answer, i) => {
        const chip = document.createElement('button');
        chip.className = 'answer-chip';
        chip.textContent = answer.text;
        chip.onclick = () => selectAnswer(answer, chip);
        answerChips.appendChild(chip);
    });
    answerSheet.style.display = 'block';
    scrollToBottom();
}

function hideAnswers() {
    answerSheet.style.display = 'none';
}

async function selectAnswer(answer, chipEl) {
    // Visual feedback
    chipEl.classList.add('selected');
    
    // Store answer
    userAnswers.push({
        question_id: questions[currentQuestion].id,
        riasec: answer.riasec,
        text: answer.text
    });

    // Hide answers, show user bubble
    setTimeout(async () => {
        hideAnswers();
        addUserBubble(answer.text);
        
        currentQuestion++;
        
        // Update progress
        document.getElementById('questionCounter').textContent = `${Math.min(currentQuestion + 1, 12)} von 12`;
        document.getElementById('progressFill').style.width = `${((currentQuestion) / 12) * 100}%`;

        if (currentQuestion >= questions.length) {
            // Done — submit
            await submitAssessment();
        } else {
            // Next question
            await showQuestion(currentQuestion);
        }
    }, 300);
}

async function showQuestion(index) {
    const q = questions[index];
    
    // Magic moment (mentor reaction to previous answer)
    if (q.magic) {
        await addMentorBubble(q.magic, 600);
        await new Promise(r => setTimeout(r, 400));
    }
    
    // Show mentor messages sequentially
    for (let i = 0; i < q.mentor.length; i++) {
        await addMentorBubble(q.mentor[i], i === 0 ? 700 : 900);
        if (i < q.mentor.length - 1) {
            await new Promise(r => setTimeout(r, 200));
        }
    }
    
    // Show answer chips
    await new Promise(r => setTimeout(r, 300));
    showAnswers(q.answers);
}

async function submitAssessment() {
    await addMentorBubble("Perfekt. Ich hab alles was ich brauche. 🎯", 800);
    await new Promise(r => setTimeout(r, 500));
    await addMentorBubble("Dein Karriere-Tier wird berechnet…", 600);
    
    // Calculate RIASEC scores
    const scores = { R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 };
    userAnswers.forEach(a => {
        scores[a.riasec] = (scores[a.riasec] || 0) + 1;
    });
    
    // Send to backend
    try {
        const response = await fetch('/api/assess', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                answers: userAnswers,
                scores: scores 
            })
        });
        
        const result = await response.json();
        sessionStorage.setItem('wm_result', JSON.stringify(result));
        
        setTimeout(() => {
            window.location.href = '/ergebnis';
        }, 1500);
    } catch (error) {
        await addMentorBubble("Ups, da ist was schiefgelaufen. Versuch's nochmal.", 500);
        setTimeout(() => {
            window.location.href = '/assessment';
        }, 2000);
    }
}

// Start
showQuestion(0);
</script>
{% endblock %}
