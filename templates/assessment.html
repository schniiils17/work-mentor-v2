{% extends "base.html" %}

{% block title %}Karriere-Check — Work Mentor{% endblock %}

{% block head %}
<style>
.chat-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.chat-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0;
    -webkit-overflow-scrolling: touch;
}
.chat-messages {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.mentor-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    align-self: flex-start;
    max-width: 88%;
}
.mentor-avatar {
    width: 28px;
    height: 28px;
    min-width: 28px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
}
.chat-bubble {
    padding: 12px 16px;
    font-size: 15px;
    line-height: 1.5;
    animation: fadeInUp 0.3s ease forwards;
}
.chat-bubble.mentor {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 16px 16px 16px 4px;
    color: var(--text-primary);
}
.chat-bubble.user {
    background: var(--accent);
    color: #fff;
    border-radius: 16px 16px 4px 16px;
    align-self: flex-end;
    max-width: 85%;
    padding: 10px 16px;
    font-size: 14px;
}
.typing-indicator {
    display: inline-flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 16px 16px 16px 4px;
}
.typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: typingBounce 1.4s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
}

/* ── Likert Scale im Chat ── */
.likert-sheet {
    background: var(--bg);
    border-top: 1px solid var(--border-light);
    padding: 20px 0 28px;
}
.likert-question {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 6px;
}
.likert-statement {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.3;
    margin-bottom: 24px;
    color: var(--text-primary);
}

.likert-scale {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin: 0 auto;
    max-width: 320px;
}
.likert-btn {
    aspect-ratio: 1;
    border: 1.5px solid var(--border);
    background: var(--bg-card);
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.18s ease;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

/* Größenstaffelung wie 16personalities */
.likert-btn[data-value="-3"], .likert-btn[data-value="3"] { width: 100%; }
.likert-btn[data-value="-2"], .likert-btn[data-value="2"] { width: 86%; margin: 0 auto; }
.likert-btn[data-value="-1"], .likert-btn[data-value="1"] { width: 72%; margin: 0 auto; }
.likert-btn[data-value="0"] { width: 58%; margin: 0 auto; }

/* Farben */
.likert-btn.neg { border-color: #C9A878; }
.likert-btn.pos { border-color: var(--accent); }
.likert-btn.neutral { border-color: #B8B8B3; }

.likert-btn:hover { transform: scale(1.08); }
.likert-btn:active { transform: scale(0.95); }

.likert-btn.selected.neg { background: #C9A878; border-color: #C9A878; }
.likert-btn.selected.neutral { background: #B8B8B3; border-color: #B8B8B3; }
.likert-btn.selected.pos { background: var(--accent); border-color: var(--accent); }

.likert-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    padding: 0 4px;
    max-width: 320px;
    margin-left: auto;
    margin-right: auto;
}
.likert-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
}
</style>
{% endblock %}

{% block body %}
<div class="container screen" id="app">
    
    <!-- Header -->
    <header class="header">
        <a href="/" class="logo"><span class="logo-mark">M</span>Work Mentor</a>
        <span class="progress-label" id="itemCounter">1 von 24</span>
    </header>

    <!-- Progress -->
    <div class="progress-section">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 4%"></div>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-wrapper">
        <div class="chat-scroll" id="chatScroll">
            <div class="chat-messages" id="chatMessages">
            </div>
        </div>

        <!-- Likert Scale -->
        <div class="likert-sheet" id="likertSheet" style="display: none;">
            <div class="likert-question">Wie sehr würde dir das Spaß machen?</div>
            <div class="likert-statement" id="likertStatement"></div>
            
            <div class="likert-scale">
                <button class="likert-btn neg" data-value="-3" aria-label="Gar nicht"></button>
                <button class="likert-btn neg" data-value="-2" aria-label="Eher nicht"></button>
                <button class="likert-btn neg" data-value="-1" aria-label="Wenig"></button>
                <button class="likert-btn neutral" data-value="0" aria-label="Neutral"></button>
                <button class="likert-btn pos" data-value="1" aria-label="Ein bisschen"></button>
                <button class="likert-btn pos" data-value="2" aria-label="Ziemlich"></button>
                <button class="likert-btn pos" data-value="3" aria-label="Sehr gerne"></button>
            </div>
            <div class="likert-labels">
                <span class="likert-label">Gar nicht</span>
                <span class="likert-label">Sehr gerne</span>
            </div>
        </div>
    </div>

    <!-- Back -->
    <div style="padding: 8px 0 16px;">
        <span class="back-link" id="backBtn" style="visibility: hidden; cursor: pointer; font-size: 14px; color: var(--text-secondary);" onclick="goBack()">← Zurück</span>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
// Items from backend (24 Likert-Aussagen)
const items = {{ items | tojson }};
let currentIndex = 0;
let answers = [];

const chatMessages = document.getElementById('chatMessages');
const chatScroll = document.getElementById('chatScroll');
const likertSheet = document.getElementById('likertSheet');
const likertStatement = document.getElementById('likertStatement');

// Magic moments — Mentor kommentiert zwischen den Fragen
const magicMoments = {
    0: ["Schön, dass du da bist! 👋", "Ich zeige dir gleich ein paar Tätigkeiten. Sag mir einfach, wie sehr dir das Spaß machen würde."],
    6: ["Interessant… ich seh schon ein Muster. 🧐"],
    12: ["Halbzeit! Du machst das super. 💪"],
    18: ["Fast geschafft. Die letzten Fragen sind die spannendsten. 🎯"],
};

const valueLabels = {
    '-3': 'Gar nicht',
    '-2': 'Eher nicht',
    '-1': 'Wenig',
    '0': 'Neutral',
    '1': 'Ein bisschen',
    '2': 'Ziemlich',
    '3': 'Sehr gerne'
};

function scrollToBottom() {
    setTimeout(() => { chatScroll.scrollTop = chatScroll.scrollHeight; }, 50);
}

function addMentorBubble(text, delay) {
    return new Promise(resolve => {
        const typingRow = document.createElement('div');
        typingRow.className = 'mentor-row';
        typingRow.innerHTML = `
            <div class="mentor-avatar">M</div>
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        `;
        chatMessages.appendChild(typingRow);
        scrollToBottom();

        setTimeout(() => {
            typingRow.innerHTML = `
                <div class="mentor-avatar">M</div>
                <div class="chat-bubble mentor">${text}</div>
            `;
            scrollToBottom();
            resolve();
        }, delay || 700);
    });
}

function addUserBubble(text) {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble user';
    bubble.textContent = text;
    chatMessages.appendChild(bubble);
    scrollToBottom();
}

function showLikert(item) {
    likertStatement.textContent = item.text;
    likertSheet.style.display = 'block';
    
    // Reset buttons
    document.querySelectorAll('.likert-btn').forEach(btn => {
        btn.classList.remove('selected');
    });
    
    // Restore previous answer if going back
    const existing = answers[currentIndex];
    if (existing !== undefined && existing !== null) {
        const btn = document.querySelector(`.likert-btn[data-value="${existing.value}"]`);
        if (btn) btn.classList.add('selected');
    }
    
    scrollToBottom();
}

function hideLikert() {
    likertSheet.style.display = 'none';
}

async function showItem(index) {
    const item = items[index];
    
    // Update UI
    document.getElementById('itemCounter').textContent = `${index + 1} von ${items.length}`;
    document.getElementById('progressFill').style.width = `${((index + 1) / items.length) * 100}%`;
    document.getElementById('backBtn').style.visibility = index > 0 ? 'visible' : 'hidden';
    
    // Magic moment?
    if (magicMoments[index]) {
        for (const msg of magicMoments[index]) {
            await addMentorBubble(msg, 600);
            await new Promise(r => setTimeout(r, 250));
        }
    }
    
    // Show likert
    showLikert(item);
}

// Likert button clicks
document.querySelectorAll('.likert-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        const value = parseInt(this.dataset.value);
        
        // Visual feedback
        document.querySelectorAll('.likert-btn').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');
        
        // Store
        answers[currentIndex] = {
            item_id: items[currentIndex].id,
            value: value
        };
        
        // Show as user bubble + next
        setTimeout(async () => {
            hideLikert();
            addUserBubble(valueLabels[String(value)]);
            
            currentIndex++;
            
            if (currentIndex >= items.length) {
                await submitAssessment();
            } else {
                await showItem(currentIndex);
            }
        }, 200);
    });
});

function goBack() {
    if (currentIndex > 0) {
        currentIndex--;
        // Remove last user bubble
        const bubbles = chatMessages.querySelectorAll('.chat-bubble.user');
        if (bubbles.length) bubbles[bubbles.length - 1].remove();
        showLikert(items[currentIndex]);
        document.getElementById('itemCounter').textContent = `${currentIndex + 1} von ${items.length}`;
        document.getElementById('progressFill').style.width = `${((currentIndex + 1) / items.length) * 100}%`;
        document.getElementById('backBtn').style.visibility = currentIndex > 0 ? 'visible' : 'hidden';
    }
}

async function submitAssessment() {
    await addMentorBubble("Perfekt — ich hab alles was ich brauche. 🎯", 700);
    await new Promise(r => setTimeout(r, 400));
    await addMentorBubble("Dein Karriere-Tier wird berechnet…", 600);
    
    try {
        const response = await fetch('/api/assess', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                answers: answers.filter(a => a !== null && a !== undefined)
            })
        });
        
        const result = await response.json();
        sessionStorage.setItem('wm_result', JSON.stringify(result));
        
        setTimeout(() => {
            window.location.href = '/ergebnis';
        }, 1500);
    } catch (error) {
        await addMentorBubble("Ups, da ist was schiefgelaufen. Versuch's nochmal.", 500);
        setTimeout(() => { window.location.href = '/assessment'; }, 2000);
    }
}

// Start
showItem(0);
</script>
{% endblock %}
