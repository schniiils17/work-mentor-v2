{% extends "base.html" %}
{% block title %}Persönlicher Fit-Check — Work Mentor{% endblock %}

{% block head %}
<style>
.fc-screen {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
}
.fc-header {
    padding: 16px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.fc-job-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px 4px 8px;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-full);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-primary);
}
.fc-job-dot { width: 6px; height: 6px; border-radius: 50%; background: #A86A2D; }
.fc-counter { font-size: 13px; color: var(--text-muted); font-weight: 500; }
.fc-progress { padding: 10px 20px 0; }
.fc-progress-bar { height: 3px; background: var(--border-light); border-radius: 2px; overflow: hidden; }
.fc-progress-fill { height: 100%; background: #A86A2D; border-radius: 2px; transition: width 0.4s ease; }
.fc-chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; max-height: 44vh; }
.fc-mentor-row { display: flex; gap: 8px; align-items: flex-end; align-self: flex-start; max-width: 88%; }
.fc-avatar {
    width: 28px; height: 28px; min-width: 28px; border-radius: 50%;
    background: #A86A2D; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
}
.fc-bubble-mentor {
    background: var(--bg-card); border: 1px solid var(--border-light);
    border-radius: 16px 16px 16px 4px;
    padding: 12px 16px; font-size: 15px; line-height: 1.5;
    color: var(--text-primary);
    animation: fadeInUp 0.3s ease forwards;
}
.fc-bubble-user {
    background: #A86A2D; color: #fff;
    border-radius: 16px 16px 4px 16px;
    align-self: flex-end; max-width: 85%;
    padding: 10px 16px; font-size: 14px;
    animation: fadeInUp 0.3s ease forwards;
}
.fc-typing {
    display: inline-flex; gap: 4px; padding: 12px 16px;
    background: var(--bg-card); border: 1px solid var(--border-light);
    border-radius: 16px 16px 16px 4px;
}
.fc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); animation: typingBounce 1.4s infinite; }
.fc-dot:nth-child(2) { animation-delay: 0.2s; }
.fc-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
}
.fc-rating-sheet {
    background: var(--bg); border-top: 1px solid var(--border-light);
    padding: 16px 20px 24px;
}
.fc-statement { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.3; margin-bottom: 16px; color: var(--text-primary); }
.fc-chips { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.fc-chip {
    padding: 12px 0; background: var(--bg-card);
    border: 1.5px solid var(--border); border-radius: 10px;
    font-family: var(--font); font-size: 11px; font-weight: 600;
    color: var(--text-secondary); text-align: center; cursor: pointer;
    transition: all 0.15s ease; -webkit-tap-highlight-color: transparent;
}
.fc-chip:active { transform: scale(0.95); }
.fc-chip.selected { background: #A86A2D; border-color: #A86A2D; color: #fff; }
.fc-loading {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 60px 20px;
}
.fc-loading-dots { display: flex; gap: 8px; }
.fc-loading-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #A86A2D; opacity: 0.3;
    animation: loadPulse 1.4s infinite;
}
.fc-loading-dot:nth-child(2) { animation-delay: 0.2s; }
.fc-loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes loadPulse {
    0%,60%,100% { opacity: 0.3; transform: scale(0.8); }
    30% { opacity: 1; transform: scale(1); }
}
.fc-loading-text { font-size: 15px; color: var(--text-secondary); text-align: center; }
.fc-back { padding: 8px 20px 16px; }
</style>
{% endblock %}

{% block body %}
<div class="container fc-screen" id="fcApp">

    <div class="fc-header">
        <span class="fc-job-pill">
            <span class="fc-job-dot"></span>
            <span id="fcJobName">Dein Job</span>
        </span>
        <span class="fc-counter" id="fcCounter">1 von 8</span>
    </div>

    <div class="fc-progress">
        <div class="fc-progress-bar">
            <div class="fc-progress-fill" id="fcProgressFill" style="width: 12.5%"></div>
        </div>
    </div>

    <div class="fc-chat" id="fcChat"></div>

    <div class="fc-rating-sheet" id="fcRatingSheet" style="display:none;">
        <div class="fc-statement" id="fcStatement"></div>
        <div class="fc-chips">
            <button class="fc-chip" data-value="-2">Stimmt nicht</button>
            <button class="fc-chip" data-value="-1">Eher nicht</button>
            <button class="fc-chip" data-value="0">Teils-teils</button>
            <button class="fc-chip" data-value="1">Eher ja</button>
            <button class="fc-chip" data-value="2">Stimmt voll</button>
        </div>
    </div>

    <div class="fc-back">
        <span style="visibility:hidden; font-size:14px; color:var(--text-muted); cursor:pointer;" id="fcBack" onclick="goBack()">← Zurück</span>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script>
const ITEMS = [
    "Wenn ich merke, dass ich falsch liege, korrigiere ich mich — auch öffentlich.",
    "Unter Druck werde ich eher ruhiger als aufgeregter.",
    "Ich übernehme gerne Verantwortung, auch wenn der Ausgang unsicher ist.",
    "In einem Team sorge ich oft dafür, dass alle auf dem gleichen Stand sind.",
    "Ich arbeite lieber nach einem klaren Plan als spontan zu improvisieren.",
    "Es fällt mir leicht, andere von meiner Meinung zu überzeugen.",
    "Ich treffe Entscheidungen auch wenn nicht alle Informationen vorliegen.",
    "Kritik an meiner Arbeit nehme ich als Chance wahr, nicht persönlich."
];

const MAGIC = {
    3: "Interessant — ich sehe schon ein Muster.",
    6: "Fast geschafft. Die letzten zwei sind entscheidend."
};

const VALUE_LABELS = {'-2':'Stimmt nicht','-1':'Eher nicht','0':'Teils-teils','1':'Eher ja','2':'Stimmt voll'};

const selectedJob = JSON.parse(sessionStorage.getItem('wm_selected_job') || '{}');
const wmResult = JSON.parse(sessionStorage.getItem('wm_result') || '{}');
const jobName = selectedJob.name || 'deinen Job';

document.getElementById('fcJobName').textContent = jobName;

let currentIndex = 0;
let answers = [];

const chat = document.getElementById('fcChat');
const ratingSheet = document.getElementById('fcRatingSheet');
const statement = document.getElementById('fcStatement');

function scrollDown() { setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50); }

function addMentorBubble(text, delay) {
    return new Promise(resolve => {
        const row = document.createElement('div');
        row.className = 'fc-mentor-row';
        row.innerHTML = `<div class="fc-avatar">M</div><div class="fc-typing"><div class="fc-dot"></div><div class="fc-dot"></div><div class="fc-dot"></div></div>`;
        chat.appendChild(row);
        scrollDown();
        setTimeout(() => {
            row.innerHTML = `<div class="fc-avatar">M</div><div class="fc-bubble-mentor">${text}</div>`;
            scrollDown();
            resolve();
        }, delay || 600);
    });
}

function addUserBubble(text) {
    const b = document.createElement('div');
    b.className = 'fc-bubble-user';
    b.textContent = text;
    chat.appendChild(b);
    scrollDown();
}

function showRating() {
    statement.textContent = ITEMS[currentIndex];
    ratingSheet.style.display = 'block';
    document.querySelectorAll('.fc-chip').forEach(c => c.classList.remove('selected'));
    const existing = answers[currentIndex];
    if (existing !== undefined) {
        const btn = document.querySelector(`.fc-chip[data-value="${existing.value}"]`);
        if (btn) btn.classList.add('selected');
    }
    document.getElementById('fcCounter').textContent = `${currentIndex + 1} von ${ITEMS.length}`;
    document.getElementById('fcProgressFill').style.width = `${((currentIndex + 1) / ITEMS.length) * 100}%`;
    document.getElementById('fcBack').style.visibility = currentIndex > 0 ? 'visible' : 'hidden';
    scrollDown();
}

async function showItem(index) {
    if (MAGIC[index]) {
        await addMentorBubble(MAGIC[index], 500);
        await new Promise(r => setTimeout(r, 200));
    }
    showRating();
}

document.querySelectorAll('.fc-chip').forEach(btn => {
    btn.addEventListener('click', function() {
        const value = parseInt(this.dataset.value);
        document.querySelectorAll('.fc-chip').forEach(b => b.classList.remove('selected'));
        this.classList.add('selected');

        answers[currentIndex] = { question: ITEMS[currentIndex], value };

        setTimeout(async () => {
            ratingSheet.style.display = 'none';
            addUserBubble(VALUE_LABELS[String(value)]);
            currentIndex++;

            if (currentIndex >= ITEMS.length) {
                await submitFit();
            } else {
                await showItem(currentIndex);
            }
        }, 200);
    });
});

function goBack() {
    if (currentIndex > 0) {
        currentIndex--;
        const bubbles = chat.querySelectorAll('.fc-bubble-user');
        if (bubbles.length) bubbles[bubbles.length - 1].remove();
        showRating();
    }
}

async function submitFit() {
    await addMentorBubble("Perfekt — ich hab alles was ich brauche.", 600);
    await new Promise(r => setTimeout(r, 300));
    await addMentorBubble("Dein persönlicher Report wird erstellt…", 500);

    // Replace sheet with loading indicator
    ratingSheet.style.display = 'none';
    document.querySelector('.fc-back').innerHTML = '';
    const app = document.getElementById('fcApp');
    const loadDiv = document.createElement('div');
    loadDiv.className = 'fc-loading';
    loadDiv.innerHTML = `
        <div class="fc-loading-dots">
            <div class="fc-loading-dot"></div>
            <div class="fc-loading-dot"></div>
            <div class="fc-loading-dot"></div>
        </div>
        <div class="fc-loading-text" id="fcLoadText">Analysiere dein Profil…</div>`;
    app.appendChild(loadDiv);

    const loadTexts = [
        'Analysiere dein Profil…',
        'Vergleiche mit den Job-Anforderungen…',
        'Erstelle deinen persönlichen Report…'
    ];
    let ti = 0;
    const textInterval = setInterval(() => {
        ti++;
        const el = document.getElementById('fcLoadText');
        if (el && ti < loadTexts.length) el.textContent = loadTexts[ti];
    }, 2000);

    try {
        const scores = wmResult.scores || {};
        const code = wmResult.code || 'EA';
        const cleanAnswers = answers.filter(Boolean);

        const resp = await fetch('/api/fit', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                job_name: jobName,
                scores: scores,
                code: code,
                fit_answers: cleanAnswers
            })
        });
        const fitData = await resp.json();
        clearInterval(textInterval);

        if (fitData.error) throw new Error(fitData.error);

        sessionStorage.setItem('wm_fit_result', JSON.stringify({
            ...fitData,
            job_name: jobName,
            match_pct: selectedJob.match || 0
        }));

        window.location.href = '/premium';
    } catch(e) {
        clearInterval(textInterval);
        console.error(e);
        const el = document.getElementById('fcLoadText');
        if (el) el.textContent = 'Fehler: ' + e.message + '. Bitte nochmal versuchen.';
    }
}

// Start
(async function() {
    await addMentorBubble(`Gut — du hast ${jobName} gewählt. Jetzt schauen wir wie du wirklich dazu passt.`, 700);
    await new Promise(r => setTimeout(r, 200));
    showItem(0);
})();
</script>
{% endblock %}
