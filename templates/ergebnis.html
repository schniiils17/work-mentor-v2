{% extends "base.html" %}
{% block title %}Dein Karriere-Tier — Work Mentor{% endblock %}
{% block body %}
<div class="container" id="app">
    <header class="header">
        <a href="/" class="logo"><span class="logo-mark">M</span>Work Mentor</a>
    </header>

    <section class="result-section" id="resultSection">
        <div style="text-align: center; padding: 60px 0;">
            <p style="color: var(--text-muted);">Ergebnis wird geladen…</p>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script>
// Tier-Tiere basierend auf Top-RIASEC-Dimension
const TIERS = {
    R: { name: "Der Wal", label: "REALISTISCH", emoji: "🐋", color: "#9CA3AF", colorLight: "#F0F0F0", quote: "„Ich red nicht lang — ich mach's einfach."", tagline: "praktischem Instinkt", superkraft: "Dinge bauen, die funktionieren — während andere noch planen.", kryptonit: "Endlose Meetings ohne Ergebnis." },
    I: { name: "Die Eule", label: "FORSCHEND", emoji: "🦉", color: "#3B82F6", colorLight: "#EBF2FF", quote: "„Ich will verstehen, warum es funktioniert."", tagline: "analytischem Blick", superkraft: "Muster erkennen, die andere übersehen.", kryptonit: "Entscheidungen treffen ohne genug Daten." },
    A: { name: "Der Fuchs", label: "KREATIV", emoji: "🦊", color: "#F59E0B", colorLight: "#FFF8E1", quote: "„Regeln? Ich mach meine eigenen."", tagline: "kreativem Touch", superkraft: "Ideen haben, auf die sonst keiner kommt.", kryptonit: "Starre Prozesse und Mikromanagement." },
    S: { name: "Der Delphin", label: "SOZIAL", emoji: "🐬", color: "#14B8A6", colorLight: "#E6FAF5", quote: "„Menschen sind mein Ding."", tagline: "empathischer Stärke", superkraft: "Räume schaffen, in denen sich Menschen öffnen.", kryptonit: "Konflikte, die keiner ansprechen will." },
    E: { name: "Der Adler", label: "UNTERNEHMERISCH", emoji: "🦅", color: "#E85A1A", colorLight: "#FDEEE3", quote: "„Wo andere Risiko sehen, seh ich Chancen."", tagline: "unternehmerischem Drive", superkraft: "Leute begeistern, bevor du selbst weißt, wovon du redest.", kryptonit: "Jemand sagt ‚Das haben wir schon immer so gemacht'." },
    C: { name: "Der Oktopus", label: "ORGANISIEREND", emoji: "🐙", color: "#8B5CF6", colorLight: "#F3EEFF", quote: "„Ordnung ist nicht langweilig — Ordnung ist Macht."", tagline: "systematischem Verstand", superkraft: "Chaos in Struktur verwandeln, ohne dass es jemand merkt.", kryptonit: "Wenn alle ‚mal schauen' sagen statt zu planen." }
};

function buildHexagon(scores, color) {
    // Für Likert-Scores: Rohwerte -8 bis +8 (5-Punkt-Skala, 4 Items pro Dim)
    const dims = ['R', 'I', 'A', 'S', 'E', 'C'];
    const cx = 140, cy = 140, r = 110;
    
    // Normalisierung: -8 → 0, +8 → 1
    function normalize(val) {
        return Math.max(0, Math.min(1, (val + 8) / 16));
    }
    
    function getPoint(index, normVal) {
        const angle = (Math.PI * 2 * index / 6) - Math.PI / 2;
        const dist = r * normVal * 0.85;
        return [cx + dist * Math.cos(angle), cy + dist * Math.sin(angle)];
    }
    
    function getOuterPoint(index) {
        const angle = (Math.PI * 2 * index / 6) - Math.PI / 2;
        return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
    }

    let gridLines = '';
    for (let level = 0.33; level <= 1.01; level += 0.33) {
        const points = dims.map((_, i) => {
            const angle = (Math.PI * 2 * i / 6) - Math.PI / 2;
            return `${cx + r * level * Math.cos(angle)},${cy + r * level * Math.sin(angle)}`;
        }).join(' ');
        gridLines += `<polygon points="${points}" fill="none" stroke="#E8E8E3" stroke-width="1"/>`;
    }
    
    let axisLines = dims.map((_, i) => {
        const [x, y] = getOuterPoint(i);
        return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#E8E8E3" stroke-width="1"/>`;
    }).join('');
    
    const dataPoints = dims.map((d, i) => getPoint(i, normalize(scores[d] || 0)));
    const dataPolygon = `<polygon points="${dataPoints.map(p => p.join(',')).join(' ')}" fill="${color}" fill-opacity="0.15" stroke="${color}" stroke-width="2.5"/>`;
    const dataDots = dataPoints.map(([x, y]) => `<circle cx="${x}" cy="${y}" r="4" fill="${color}"/>`).join('');
    
    const labelEls = dims.map((d, i) => {
        const angle = (Math.PI * 2 * i / 6) - Math.PI / 2;
        const lx = cx + (r + 22) * Math.cos(angle);
        const ly = cy + (r + 22) * Math.sin(angle);
        return `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#9B9B95" font-family="var(--font)">${d}</text>`;
    }).join('');

    return `<svg viewBox="0 0 280 280" class="hexagon-chart" style="width:100%;max-width:280px;">${gridLines}${axisLines}${dataPolygon}${dataDots}${labelEls}</svg>`;
}

function render() {
    let data;
    try {
        data = JSON.parse(sessionStorage.getItem('wm_result') || 'null');
    } catch(e) {
        data = null;
    }
    
    if (!data || !data.scores) {
        document.getElementById('resultSection').innerHTML = `
            <div style="text-align: center; padding: 60px 0;">
                <h2 style="font-size: 24px; font-weight: 600; margin-bottom: 12px;">Noch kein Ergebnis</h2>
                <p style="color: var(--text-secondary); margin-bottom: 24px;">Mach erst den Karriere-Check, dann zeig ich dir dein Tier.</p>
                <a href="/assessment" class="btn btn-primary">Karriere-Check starten →</a>
            </div>
        `;
        return;
    }
    
    const scores = data.scores;
    const code = data.code || 'EA';
    const topKey = code[0];
    const secondKey = code[1];
    const tier = TIERS[topKey];
    const secondTier = TIERS[secondKey];
    
    if (!tier) {
        document.getElementById('resultSection').innerHTML = `<p>Fehler beim Laden. <a href="/assessment">Nochmal versuchen</a></p>`;
        return;
    }
    
    const typeName = data.type_name || tier.name;
    const description = data.description || '';
    const tagline = secondTier ? `mit ${secondTier.tagline}` : `mit ${tier.tagline}`;

    document.getElementById('resultSection').innerHTML = `
        <div class="section-label" style="margin-top: 8px;">Dein Karriere-Tier</div>
        
        <!-- Hero Card -->
        <div class="tier-hero-card" style="background: ${tier.color}; color: white; margin-top: 12px;">
            <div class="tier-label-pill">${tier.label}</div>
            <div class="tier-illustration">${tier.emoji}</div>
        </div>
        
        <div class="tier-type-label" style="color: ${tier.color}; margin-top: 20px;">${tier.label}</div>
        <h1 class="tier-name">${tier.name}.</h1>
        <div class="tier-tagline" style="color: ${tier.color}; font-style: italic;">${tagline}</div>
        
        <blockquote class="tier-quote">${tier.quote}</blockquote>
        
        <p class="tier-description">${description}</p>
        
        <!-- Hexagon -->
        <div class="hexagon-container">
            ${buildHexagon(scores, tier.color)}
        </div>
        
        <!-- Superkraft -->
        <div class="trait-card superkraft" style="margin-top: 24px;">
            <div class="trait-card-label" style="color: ${tier.color};">⚡ SUPERKRAFT</div>
            <div class="trait-card-text">${tier.superkraft}</div>
        </div>
        
        <!-- Kryptonit -->
        <div class="trait-card kryptonit" style="margin-top: 12px;">
            <div class="trait-card-label">💀 KRYPTONIT</div>
            <div class="trait-card-text">${tier.kryptonit}</div>
        </div>
        
        <!-- Story CTA -->
        <div class="story-cta" style="background: ${tier.color}; margin-top: 24px;">
            <div class="story-cta-label">STORY-KARTE</div>
            <div class="story-cta-text">„Ich bin ${tier.name}. Was bist du?"</div>
            <div class="story-cta-subtext">Bild im 9:16-Format — perfekt für deine Story.</div>
            <a href="/story" class="story-cta-btn" style="color: ${tier.color};">↗ Teile dein Ergebnis</a>
        </div>
        
        <!-- Job Match -->
        <div class="job-match-card" style="margin-top: 16px;">
            <h3 class="job-match-title">Und wo landen Leute wie du?</h3>
            <p class="job-match-text" style="margin-top:6px;">Dein Typ ist selten — nur 8% haben das gleiche Profil. Wir haben gecheckt, welche Jobs wirklich zu dir passen.</p>
            <a href="/jobs" class="btn btn-primary" style="margin-top: 16px;">Zeig mir meine Top-Jobs →</a>
        </div>
        
        <!-- Footer -->
        <div class="footer-links" style="margin-top: 32px;">
            <a href="#">Impressum</a> · <a href="#">Datenschutz</a>
        </div>
    `;
}

render();
</script>
{% endblock %}
