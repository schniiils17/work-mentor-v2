{% extends "base.html" %}
{% block title %}Dein Karriere-Tier — Work Mentor{% endblock %}
{% block body %}
<div class="container" id="app">
    <header class="header">
        <a href="/" class="logo"><span class="logo-mark">M</span>Work Mentor</a>
    </header>

    <section class="result-section" id="resultSection">
        <div style="text-align: center; padding: 60px 0;">
            <p style="color: var(--text-muted);">Ergebnis wird geladen…</p>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script>
// Tier-Tiere basierend auf Top-RIASEC-Dimension
const TIERS = {
    R: { name: "Der Wolf",    label: "REALISTISCH",     svg: "/static/img/wolf.svg",    color: "#475569", colorLight: "#E8ECF1", quote: "Ich rede nicht drüber. Ich mach's einfach.",           tagline: "handfestem Realitätssinn",   superkraft: "Aus dem Nichts etwas Funktionierendes bauen — bevor andere überhaupt verstanden haben, wie das Problem aussieht.", kryptonit: "Endlose Meetings, in denen geredet wird statt gemacht." },
    I: { name: "Die Eule",    label: "FORSCHEND",       svg: "/static/img/eule.svg",    color: "#4338CA", colorLight: "#E8E7F8", quote: "Ich seh, was andere übersehen.",                        tagline: "analytischer Tiefe",             superkraft: "Muster erkennen, wo andere nur Chaos sehen — und das so erklären, dass es plötzlich offensichtlich wirkt.",    kryptonit: "Jemand sagt 'Glaub mir einfach' ohne Daten zu zeigen." },
    A: { name: "Der Fuchs",   label: "KREATIV",         svg: "/static/img/fuchs.svg",   color: "#F59E0B", colorLight: "#FCF1DA", quote: "Die besten Ideen passen in keine Box.",                   tagline: "kreativem Instinkt",             superkraft: "Bestehende Ideen so neu kombinieren, dass alle denken: Klar, warum hat das nicht schon jemand gemacht?",               kryptonit: "Eine Vorlage in PowerPoint, die du ausfüllen sollst." },
    S: { name: "Der Delphin", label: "SOZIAL",          svg: "/static/img/delphin.svg", color: "#0D9488", colorLight: "#DBF2EE", quote: "Menschen sind mein Projekt.",                              tagline: "sozialem Gespür",                superkraft: "Eine Gruppe so führen, dass sich jeder einzelne gesehen fühlt — und am Ende mehr leistet als gedacht.",  kryptonit: "Allein in einem Co-Working zwischen 30 Headphones." },
    E: { name: "Der Adler",   label: "UNTERNEHMERISCH", svg: "/static/img/adler.svg",   color: "#EA580C", colorLight: "#FCE5D2", quote: "Wo andere Risiko sehen, seh ich Chancen.",                 tagline: "unternehmerischem Drive",        superkraft: "Leute begeistern, bevor du selbst weißt, wovon du redest.",                                                         kryptonit: "Jemand sagt: Das haben wir schon immer so gemacht." },
    C: { name: "Der Oktopus", label: "ORGANISIEREND",   svg: "/static/img/oktopus.svg", color: "#7C3AED", colorLight: "#ECE2FA", quote: "Der Plan steht. Immer.",                                   tagline: "strukturiertem Kopf",            superkraft: "Aus Datenchaos eine saubere Struktur machen, die so logisch wirkt, als wäre sie schon immer da gewesen.",           kryptonit: "Lass uns das spontan entscheiden." }
};

function buildHexagon(scores, color) {
    // Rohwerte -12 bis +12 (5-Punkt-Skala -2 bis +2, 6 Items pro Dim)
    const dims = ['R', 'I', 'A', 'S', 'E', 'C'];
    const cx = 140, cy = 140, r = 110;
    
    // Normalisierung: -12 → 0, +12 → 1
    function normalize(val) {
        return Math.max(0, Math.min(1, (val + 12) / 24));
    }
    
    function getPoint(index, normVal) {
        const angle = (Math.PI * 2 * index / 6) - Math.PI / 2;
        const dist = r * normVal * 0.85;
        return [cx + dist * Math.cos(angle), cy + dist * Math.sin(angle)];
    }
    
    function getOuterPoint(index) {
        const angle = (Math.PI * 2 * index / 6) - Math.PI / 2;
        return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
    }

    let gridLines = '';
    for (let level = 0.33; level <= 1.01; level += 0.33) {
        const points = dims.map((_, i) => {
            const angle = (Math.PI * 2 * i / 6) - Math.PI / 2;
            return `${cx + r * level * Math.cos(angle)},${cy + r * level * Math.sin(angle)}`;
        }).join(' ');
        gridLines += `<polygon points="${points}" fill="none" stroke="#E8E8E3" stroke-width="1"/>`;
    }
    
    let axisLines = dims.map((_, i) => {
        const [x, y] = getOuterPoint(i);
        return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#E8E8E3" stroke-width="1"/>`;
    }).join('');
    
    const dataPoints = dims.map((d, i) => getPoint(i, normalize(scores[d] || 0)));
    const dataPolygon = `<polygon points="${dataPoints.map(p => p.join(',')).join(' ')}" fill="${color}" fill-opacity="0.15" stroke="${color}" stroke-width="2.5"/>`;
    const dataDots = dataPoints.map(([x, y]) => `<circle cx="${x}" cy="${y}" r="4" fill="${color}"/>`).join('');
    
    const labelEls = dims.map((d, i) => {
        const angle = (Math.PI * 2 * i / 6) - Math.PI / 2;
        const lx = cx + (r + 24) * Math.cos(angle);
        const ly = cy + (r + 24) * Math.sin(angle);
        return `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#9B9B95" font-family="var(--font)">${d}</text>`;
    }).join('');

    return `<svg viewBox="-10 -10 300 300" class="hexagon-chart" style="width:100%;max-width:280px;">${gridLines}${axisLines}${dataPolygon}${dataDots}${labelEls}</svg>`;
}

function render() {
    let data;
    try {
        const raw = sessionStorage.getItem('wm_result');
        console.log('[WM] sessionStorage raw:', raw);
        data = raw ? JSON.parse(raw) : null;
    } catch(e) {
        console.error('[WM] parse error:', e);
        data = null;
    }
    
    if (!data || !data.scores) {
        document.getElementById('resultSection').innerHTML = `
            <div style="text-align: center; padding: 60px 0;">
                <h2 style="font-size: 24px; font-weight: 600; margin-bottom: 12px;">Noch kein Ergebnis</h2>
                <p style="color: var(--text-secondary); margin-bottom: 24px;">Mach erst den Karriere-Check, dann zeig ich dir dein Tier.</p>
                <a href="/assessment" class="btn btn-primary">Karriere-Check starten →</a>
            </div>
        `;
        return;
    }
    
    try {
    const scores = data.scores;
    const code = data.code || 'EA';
    const topKey = code[0];
    const secondKey = code[1];
        const CHAMELEON = { name: "Das Cham\u00e4leon", label: "ANPASSUNGSF\u00c4HIG", svg: "/static/img/chamaeleon.svg", color: "#3D5A6C", colorLight: "#E6EAEE", quote: "Ich passe mich an \u2014 und genau das ist meine St\u00e4rke.", tagline: "vielseitigem Instinkt", superkraft: "Zwischen Welten \u00fcbersetzen, die sonst nicht miteinander reden.", kryptonit: "Auf EINE Schiene festgelegt werden." };
    const tier = data.is_generalist ? CHAMELEON : TIERS[topKey];
    const secondTier = TIERS[secondKey];
    
    if (!tier) {
        document.getElementById('resultSection').innerHTML = `<p>Fehler: Unbekannter Typ "${topKey}". <a href="/assessment">Nochmal versuchen</a></p>`;
        return;
    }
    
    const typeName = data.type_name || tier.name;
    const description = data.description || '';
    const tagline = secondTier ? `mit ${secondTier.tagline}` : `mit ${tier.tagline}`;

    document.getElementById('resultSection').innerHTML = `
        <div class="section-label" style="margin-top: 8px;">Dein Karriere-Tier</div>
        
        <!-- Hero Card -->
        <div class="tier-hero-card" style="background: ${tier.color}; color: white; margin-top: 12px;">
            <div class="tier-label-pill">${tier.label}</div>
            <img class="tier-illustration" src="${tier.svg}" alt="${tier.name}">
        </div>
        
        <div class="tier-type-label" style="color: ${tier.color}; margin-top: 20px;">${tier.label}</div>
        <h1 class="tier-name">${tier.name}.</h1>
        <div class="tier-tagline" style="color: ${tier.color}; font-style: italic;">${tagline}</div>
        <div style="margin-top: 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; color: var(--text-muted);">${code} \u00B7 ${data.dimensions?.first_label || ''} \u00B7 ${data.dimensions?.second_label || ''}</div>
        
        ${data.answer_quality && !data.answer_quality.valid ? '<div style="background: #FEF3C7; border: 1px solid #F59E0B; border-radius: 12px; padding: 12px 16px; margin: 12px 0; font-size: 13px; color: #92400E;">\u26A0\uFE0F Deine Antworten waren sehr einheitlich. Das Ergebnis k\u00F6nnte ungenau sein. <a href=\"/assessment\" style=\"color: #92400E; font-weight: 600;\">Nochmal versuchen?</a></div>' : ''}
        <blockquote class="tier-quote">${tier.quote}</blockquote>
        
        <p class="tier-description">${data.ai_description || description}</p>
        
        <div style="display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0;">
            ${(data.strengths || []).map(s => '<span style="display: inline-block; font-size: 13px; font-weight: 500; background: var(--bg-soft, #F0EDE6); color: var(--text-primary, #141414); padding: 6px 14px; border-radius: 100px;">' + s + '</span>').join('')}
        </div>
        
        <!-- Hexagon -->
        <div class="hexagon-container">
            ${buildHexagon(scores, tier.color)}
        </div>
        
        <!-- Superkraft -->
        <div class="trait-card superkraft" style="margin-top: 24px;">
            <div class="trait-card-label" style="color: ${tier.color};">⚡ SUPERKRAFT</div>
            <div class="trait-card-text">${tier.superkraft}</div>
        </div>
        
        <!-- Kryptonit -->
        <div class="trait-card kryptonit" style="margin-top: 12px;">
            <div class="trait-card-label">💀 KRYPTONIT</div>
            <div class="trait-card-text">${tier.kryptonit}</div>
        </div>
        
        <!-- Story CTA -->
        <div class="story-cta" style="background: ${tier.color}; margin-top: 24px;">
            <div class="story-cta-label">STORY-KARTE</div>
            <div class="story-cta-text">Ich bin ${tier.name}. Was bist du?</div>
            <div class="story-cta-subtext">Bild im 9:16-Format — perfekt für deine Story.</div>
            <a href="/story" class="story-cta-btn" style="color: ${tier.color};">↗ Teile dein Ergebnis</a>
        </div>
        
        <!-- Job Match -->
        <div class="job-match-card" style="margin-top: 16px;">
            <h3 class="job-match-title">Und wo landen Leute wie du?</h3>
            <p class="job-match-text" style="margin-top:6px;">${data.ai_job_teaser || 'Wir haben gecheckt, welche Jobs zu deinem Profil passen.'}</p>
            <a href="/jobs" class="btn btn-primary" style="margin-top: 16px;">Zeig mir meine Top-Jobs →</a>
        </div>
        
        <!-- Footer -->
        <div class="footer-links" style="margin-top: 32px;">
            <a href="#">Impressum</a> · <a href="#">Datenschutz</a>
        </div>
    `;

    } catch(err) {
        console.error('[WM] render error:', err);
        document.getElementById('resultSection').innerHTML = `
            <div style="padding: 40px 0; text-align: center;">
                <p style="color: red; margin-bottom: 16px;">Fehler: ${err.message}</p>
                <a href="/assessment" class="btn btn-primary">Nochmal versuchen</a>
            </div>
        `;
    }
}

render();
</script>
{% endblock %}
