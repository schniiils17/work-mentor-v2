{% extends "base.html" %}
{% block title %}Dein Karriere-Tier — Work Mentor{% endblock %}
{% block body %}
<div class="container" id="app">
    <header class="header">
        <a href="/" class="logo"><span class="logo-mark">M</span>Work Mentor</a>
    </header>

    <section class="result-section" id="resultSection">
        <!-- JS populates this -->
    </section>
</div>
{% endblock %}

{% block scripts %}
<script>
// Tier data
const TIERS = {
    R: { name: "Der Wal", label: "REALISTISCH", emoji: "🐋", color: "#9CA3AF", colorLight: "#F0F0F0", quote: "„Ich red nicht lang — ich mach's einfach."", tagline: "mit praktischem Instinkt", superkraft: "Dinge bauen, die funktionieren — während andere noch planen.", kryptonit: "Endlose Meetings ohne Ergebnis." },
    I: { name: "Die Eule", label: "FORSCHEND", emoji: "🦉", color: "#3B82F6", colorLight: "#EBF2FF", quote: "„Ich will verstehen, warum es funktioniert."", tagline: "mit analytischem Blick", superkraft: "Muster erkennen, die andere übersehen.", kryptonit: "Entscheidungen treffen ohne genug Daten." },
    A: { name: "Der Fuchs", label: "KREATIV", emoji: "🦊", color: "#F59E0B", colorLight: "#FFF8E1", quote: "„Regeln? Ich mach meine eigenen."", tagline: "mit kreativem Touch", superkraft: "Ideen haben, auf die sonst keiner kommt.", kryptonit: "Starre Prozesse und Mikromanagement." },
    S: { name: "Der Delphin", label: "SOZIAL", emoji: "🐬", color: "#14B8A6", colorLight: "#E6FAF5", quote: "„Menschen sind mein Ding."", tagline: "mit empathischer Stärke", superkraft: "Räume schaffen, in denen sich Menschen öffnen.", kryptonit: "Konflikte, die keiner ansprechen will." },
    E: { name: "Der Adler", label: "UNTERNEHMERISCH", emoji: "🦅", color: "#E85A1A", colorLight: "#FDEEE3", quote: "„Wo andere Risiko sehen, seh ich Chancen."", tagline: "mit kreativem Touch", superkraft: "Leute begeistern, bevor du selbst weißt, wovon du redest.", kryptonit: "Jemand sagt 'Das haben wir schon immer so gemacht'." },
    C: { name: "Der Oktopus", label: "ORGANISIEREND", emoji: "🐙", color: "#8B5CF6", colorLight: "#F3EEFF", quote: "„Ordnung ist nicht langweilig — Ordnung ist Macht."", tagline: "mit systematischem Verstand", superkraft: "Chaos in Struktur verwandeln, ohne dass es jemand merkt.", kryptonit: "Wenn alle 'mal schauen' sagen statt zu planen." }
};

function getTopType(scores) {
    let max = 0, topKey = 'E';
    for (const [key, val] of Object.entries(scores)) {
        if (val > max) { max = val; topKey = key; }
    }
    return topKey;
}

function getSecondType(scores, top) {
    let max = 0, secondKey = null;
    for (const [key, val] of Object.entries(scores)) {
        if (key !== top && val > max) { max = val; secondKey = key; }
    }
    return secondKey;
}

function buildHexagon(scores) {
    // Normalize scores to 0-1 range
    const maxScore = Math.max(...Object.values(scores), 1);
    const dims = ['R', 'I', 'A', 'S', 'E', 'C'];
    const labels = ['R', 'I', 'A', 'S', 'E', 'C'];
    const cx = 140, cy = 140, r = 110;
    
    function getPoint(index, value) {
        const angle = (Math.PI * 2 * index / 6) - Math.PI / 2;
        const dist = r * (value / maxScore) * 0.85;
        return [cx + dist * Math.cos(angle), cy + dist * Math.sin(angle)];
    }
    
    function getOuterPoint(index) {
        const angle = (Math.PI * 2 * index / 6) - Math.PI / 2;
        return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
    }

    // Grid lines
    let gridLines = '';
    for (let level = 0.33; level <= 1; level += 0.33) {
        const points = dims.map((_, i) => {
            const angle = (Math.PI * 2 * i / 6) - Math.PI / 2;
            const dist = r * level;
            return `${cx + dist * Math.cos(angle)},${cy + dist * Math.sin(angle)}`;
        }).join(' ');
        gridLines += `<polygon points="${points}" fill="none" stroke="#E8E8E3" stroke-width="1"/>`;
    }
    
    // Axis lines
    let axisLines = dims.map((_, i) => {
        const [x, y] = getOuterPoint(i);
        return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#E8E8E3" stroke-width="1"/>`;
    }).join('');
    
    // Data polygon
    const dataPoints = dims.map((d, i) => getPoint(i, scores[d] || 0));
    const dataPolygon = `<polygon points="${dataPoints.map(p => p.join(',')).join(' ')}" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="2"/>`;
    
    // Data dots
    const dataDots = dataPoints.map(([x, y]) => 
        `<circle cx="${x}" cy="${y}" r="4" fill="currentColor"/>`
    ).join('');
    
    // Labels
    const labelEls = dims.map((d, i) => {
        const angle = (Math.PI * 2 * i / 6) - Math.PI / 2;
        const lx = cx + (r + 20) * Math.cos(angle);
        const ly = cy + (r + 20) * Math.sin(angle);
        return `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#9B9B95">${labels[i]}</text>`;
    }).join('');

    return `<svg viewBox="0 0 280 280" class="hexagon-chart">${gridLines}${axisLines}${dataPolygon}${dataDots}${labelEls}</svg>`;
}

function render() {
    const data = JSON.parse(sessionStorage.getItem('wm_result') || '{}');
    const scores = data.scores || { R: 2, I: 1, A: 3, S: 1, E: 4, C: 1 };
    
    const topKey = getTopType(scores);
    const secondKey = getSecondType(scores, topKey);
    const tier = TIERS[topKey];
    const secondTier = secondKey ? TIERS[secondKey] : null;
    
    const tagline = secondTier ? `mit ${secondTier.tagline.replace('mit ', '')}` : tier.tagline;

    document.getElementById('resultSection').innerHTML = `
        <div class="section-label" style="margin-top: 8px;">Dein Karriere-Tier</div>
        
        <!-- Hero Card -->
        <div class="tier-hero-card" style="background: ${tier.color}; color: white; margin-top: 12px;">
            <div class="tier-label-pill">${tier.label}</div>
            <div class="tier-illustration">${tier.emoji}</div>
        </div>
        
        <div class="tier-type-label" style="color: ${tier.color}; margin-top: 20px;">${tier.label}</div>
        <h1 class="tier-name">${tier.name}.</h1>
        <div class="tier-tagline" style="color: ${tier.color}; font-style: italic;">${tagline}</div>
        
        <blockquote class="tier-quote">${tier.quote}</blockquote>
        
        <p class="tier-description">${data.description || 'Du siehst das große Bild, während andere sich in Details verlieren. Überzeugen ist keine Technik für dich — es passiert einfach. Du willst nicht verwalten, du willst gestalten.'}</p>
        
        <!-- Hexagon -->
        <div class="hexagon-container" style="color: ${tier.color}">
            ${buildHexagon(scores)}
        </div>
        
        <!-- Superkraft -->
        <div class="trait-card superkraft" style="margin-top: 24px;">
            <div class="trait-card-label" style="color: ${tier.color};">⚡ SUPERKRAFT</div>
            <div class="trait-card-text">${tier.superkraft}</div>
        </div>
        
        <!-- Kryptonit -->
        <div class="trait-card kryptonit" style="margin-top: 12px;">
            <div class="trait-card-label">💀 KRYPTONIT</div>
            <div class="trait-card-text">${tier.kryptonit}</div>
        </div>
        
        <!-- Story CTA -->
        <div class="story-cta" style="background: ${tier.color}; margin-top: 24px;">
            <div class="story-cta-label">STORY-KARTE</div>
            <div class="story-cta-text">„Ich bin ${tier.name}. Was bist du?"</div>
            <div class="story-cta-subtext">Bild im 9:16-Format — perfekt für deine Story.</div>
            <a href="/story" class="story-cta-btn" style="color: ${tier.color};">↗ Teile dein Ergebnis</a>
        </div>
        
        <!-- Job Match -->
        <div class="job-match-card" style="margin-top: 16px;">
            <h3 class="job-match-title">Und wo landen Leute wie du?</h3>
            <p class="job-match-text">Dein Typ ist selten — nur 8% haben das gleiche Profil. Wir haben gecheckt, welche Jobs wirklich zu dir passen.</p>
            <a href="/jobs" class="btn btn-primary" style="margin-top: 16px;">Zeig mir meine Top-Jobs →</a>
        </div>
        
        <!-- Footer -->
        <div class="footer-links" style="margin-top: 32px;">
            <a href="#">Impressum</a> · <a href="#">Datenschutz</a>
        </div>
    `;
}

render();
</script>
{% endblock %}
