{% extends "base.html" %}
{% block title %}Dein Fit-Ergebnis — Work Mentor{% endblock %}

{% block head %}
<style>
.teaser-screen {
    min-height: 100dvh;
    background: var(--bg);
    padding-top: 56px;
    padding-bottom: 40px;
}
.teaser-logo-bar { padding: 10px 20px 8px; }
.teaser-context {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    font-weight: 600;
    text-align: center;
    margin-bottom: 18px;
    padding: 0 20px;
}

/* Score Arc */
.score-arc-wrap {
    display: flex;
    justify-content: center;
    position: relative;
    height: 170px;
    margin-bottom: 0;
}
.score-arc-wrap svg { position: absolute; top: 0; }
.score-arc-inner {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-bottom: 12px;
}
.score-number {
    font-size: 58px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
}
.score-pct { font-size: 24px; color: var(--text-muted); font-weight: 500; }
.score-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-top: 6px;
}
.fit-headline {
    font-size: 15px;
    font-weight: 500;
    text-align: center;
    margin: 18px 20px 32px;
    line-height: 1.4;
    color: var(--accent);
}

/* Sections */
.teaser-section-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    padding: 0 20px;
}
.teaser-section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
}
.teaser-cards { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

.strength-card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 14px 16px;
}
.strength-name { font-size: 14.5px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.strength-body { font-size: 13px; color: var(--text-secondary); line-height: 1.45; }

/* Blur cards */
.blur-card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 15px 16px;
    overflow: hidden;
}
.blur-inner {
    filter: blur(5px);
    user-select: none;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    gap: 9px;
}
.blur-title-bar { height: 13px; width: 46%; border-radius: 4px; background: var(--text-secondary); opacity: 0.5; }
.blur-body-bar { height: 10px; border-radius: 4px; background: var(--text-muted); opacity: 0.4; }

/* Paywall */
.paywall-divider { height: 1px; background: var(--border-light); margin: 4px 20px 24px; }
.paywall-text {
    text-align: center;
    padding: 0 24px;
    margin-bottom: 18px;
}
.paywall-headline {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    line-height: 1.3;
    margin-bottom: 6px;
}
.paywall-sub { font-size: 15px; color: var(--text-secondary); font-weight: 400; }
.btn-pay {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: calc(100% - 40px);
    margin: 0 20px;
    padding: 19px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(26,58,92,0.18);
    text-decoration: none;
}
.btn-pay:hover { background: var(--accent-hover); }
.pay-trust {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin: 10px 20px 0;
    font-size: 11px;
    color: var(--text-muted);
}
.other-job-btn {
    display: block;
    text-align: center;
    margin: 18px auto 0;
    font-size: 13px;
    color: var(--text-muted);
    background: none;
    border: none;
    font-family: var(--font);
    cursor: pointer;
    padding: 8px;
}
</style>
{% endblock %}

{% block body %}
<div class="container teaser-screen" id="teaserScreen">
    <div style="text-align:center;padding:80px 0;color:var(--text-muted);">Lade Ergebnis…</div>
</div>
{% endblock %}

{% block scripts %}
<script>
const fitData = JSON.parse(sessionStorage.getItem('wm_fit_result') || 'null');
const wmResult = JSON.parse(sessionStorage.getItem('wm_result') || '{}');

if (!fitData) {
    document.getElementById('teaserScreen').innerHTML = `
        <div style="text-align:center;padding:80px 20px;">
            <p style="color:var(--text-muted);margin-bottom:24px;">Kein Ergebnis gefunden.</p>
            <a href="/assessment" class="btn btn-primary">Karriere-Check starten →</a>
        </div>`;
} else {
    renderTeaser(fitData, wmResult);
}

function buildScoreArcSVG(score) {
    const R = 76, CX = 100, CY = 100;
    const START = 135, SWEEP = 270;
    function polar(deg) {
        const rad = (deg - 90) * Math.PI / 180;
        return [CX + R * Math.cos(rad), CY + R * Math.sin(rad)];
    }
    function arcPath(fromDeg, toDeg) {
        const [x1,y1] = polar(fromDeg);
        const [x2,y2] = polar(toDeg);
        const large = (toDeg - fromDeg) > 180 ? 1 : 0;
        return `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`;
    }
    const progress = Math.min(1, score / 100);
    const color = score >= 70 ? '#2D6A4F' : '#A86A2D';
    return `<svg width="200" height="200" viewBox="0 0 200 200" id="scoreArcSvg">
        <path d="${arcPath(START, START+SWEEP)}" fill="none" stroke="#EFEDE6" stroke-width="10" stroke-linecap="round"/>
        <path d="${arcPath(START, START+SWEEP*progress)}" id="arcFill" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round"/>
    </svg>`;
}

function animateArc(targetScore) {
    const SWEEP = 270;
    const R = 76, CX = 100, CY = 100, START = 135;
    function polar(deg) {
        const rad = (deg - 90) * Math.PI / 180;
        return [CX + R * Math.cos(rad), CY + R * Math.sin(rad)];
    }
    function arcPath(fromDeg, toDeg) {
        const [x1,y1] = polar(fromDeg);
        const [x2,y2] = polar(toDeg);
        const large = (toDeg - fromDeg) > 180 ? 1 : 0;
        return `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`;
    }
    const arcEl = document.getElementById('arcFill');
    const numEl = document.getElementById('scoreNumber');
    if (!arcEl || !numEl) return;
    const start = Date.now(), dur = 1400;
    function tick() {
        const e = Math.min(1, (Date.now()-start)/dur);
        const eased = 1 - Math.pow(1-e, 3);
        const current = Math.round(targetScore * eased);
        const progress = Math.min(1, current/100);
        arcEl.setAttribute('d', arcPath(START, START + SWEEP * progress));
        numEl.textContent = current;
        if (e < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
}

function blurCard(lines = 2) {
    const widths = ['92%','68%','80%','54%'];
    const bars = Array.from({length: lines}, (_, i) =>
        `<div class="blur-body-bar" style="width:${widths[i%widths.length]}"></div>`
    ).join('');
    return `<div class="blur-card"><div class="blur-inner">
        <div class="blur-title-bar"></div>${bars}
    </div></div>`;
}

function renderTeaser(data, wm) {
    const jobName = data.job_name || 'Produktmanager';
    const topKey = (wm.code || 'EA')[0];
    const tierColors = {R:'#475569',I:'#4338CA',A:'#F59E0B',S:'#0D9488',E:'#EA580C',C:'#7C3AED'};
    const tierColor = tierColors[topKey] || '#1A3A5C';

    const strengths = (data.strengths || []).map(s => `
        <div class="strength-card">
            <div class="strength-name">${s.name}</div>
            <div class="strength-body">${s.body}</div>
        </div>`).join('');

    const gapsBlurred = (data.gaps || [{},{},{}]).map(() => blurCard(2)).join('');
    const leverBlurred = blurCard(2);

    document.getElementById('teaserScreen').innerHTML = `
        <div class="teaser-logo-bar">
            <span style="display:inline-flex;align-items:center;gap:6px;font-size:15px;font-weight:600;color:var(--text-primary);">
                <span style="width:22px;height:22px;border-radius:50%;border:1.5px solid var(--text-primary);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;">M</span>
                Work Mentor
            </span>
        </div>

        <div class="teaser-context">${jobName} · Dein Fit-Ergebnis</div>

        <div class="score-arc-wrap">
            ${buildScoreArcSVG(0)}
            <div class="score-arc-inner">
                <div class="score-number"><span id="scoreNumber">0</span><span class="score-pct">%</span></div>
                <div class="score-label">FIT</div>
            </div>
        </div>

        <p class="fit-headline" style="color:${tierColor}">${data.fit_headline || 'Dein Profil passt gut zu diesem Job.'}</p>

        <div class="teaser-section-head">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2D6A4F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span class="teaser-section-label" style="color:#2D6A4F;">Was du mitbringst</span>
        </div>
        <div class="teaser-cards">${strengths}</div>

        <div class="teaser-section-head">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#A86A2D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span class="teaser-section-label" style="color:#A86A2D;">Wo es eng werden könnte</span>
        </div>
        <div class="teaser-cards">${gapsBlurred}</div>

        <div class="teaser-section-head">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
            <span class="teaser-section-label" style="color:var(--accent);">Was deinen Fit am meisten heben würde</span>
        </div>
        <div class="teaser-cards">${leverBlurred}</div>

        <div class="paywall-divider"></div>

        <div class="paywall-text">
            <div class="paywall-headline">Du hast 8 Minuten investiert.</div>
            <div class="paywall-sub">Dein vollständiges Ergebnis ist fertig.</div>
        </div>

        <a href="/fit-check-post" class="btn-pay">
            Vollständiges Ergebnis — 19 €
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>

        <div class="pay-trust">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Einmalzahlung · Kein Abo
        </div>

        <button class="other-job-btn" onclick="window.location.href='/jobs'">Anderen Job testen</button>
    `;

    animateArc(data.fit_score || 67);
}
</script>
{% endblock %}
