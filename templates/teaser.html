{% extends "base.html" %}
{% block title %}Dein Fit-Ergebnis — Work Mentor{% endblock %}

{% block head %}
<style>
.teaser-screen {
    min-height: 100dvh;
    background: var(--bg);
    padding-top: 56px;
    padding-bottom: 40px;
}
.teaser-logo-bar { padding: 10px 20px 8px; }
.teaser-insight {
    margin: 6px 20px 26px; padding: 18px 20px;
    background: var(--bg-card); border: 1px solid var(--border-light);
    border-left: 3px solid var(--accent); border-radius: var(--radius);
}
.teaser-insight-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); font-weight: 700; margin-bottom: 8px; }
.teaser-insight-text { font-size: 17px; line-height: 1.4; color: var(--text-primary); font-weight: 500; margin: 0; }
.teaser-context {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    font-weight: 600;
    text-align: center;
    margin-bottom: 18px;
    padding: 0 20px;
}

/* Score Arc */
.score-arc-wrap {
    display: flex;
    justify-content: center;
    position: relative;
    height: 170px;
    margin-bottom: 0;
}
.score-arc-wrap svg { position: absolute; top: 0; }
.score-arc-inner {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-bottom: 12px;
}
.score-number {
    font-size: 58px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
}
.score-pct { font-size: 24px; color: var(--text-muted); font-weight: 500; }
.score-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-top: 6px;
}
.fit-headline {
    font-size: 15px;
    font-weight: 500;
    text-align: center;
    margin: 18px 20px 32px;
    line-height: 1.4;
    color: var(--accent);
}

/* Sections */
.teaser-section-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    padding: 0 20px;
}
.teaser-section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 700;
}
.teaser-cards { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

.strength-card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 14px 16px;
}
.strength-name { font-size: 14.5px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.strength-body { font-size: 13px; color: var(--text-secondary); line-height: 1.45; }

/* Blur cards */
.blur-card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    padding: 15px 16px;
    overflow: hidden;
}
.blur-inner {
    filter: blur(5px);
    user-select: none;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    gap: 9px;
}
.blur-title-bar { height: 13px; width: 46%; border-radius: 4px; background: var(--text-secondary); opacity: 0.5; }
.blur-body-bar { height: 10px; border-radius: 4px; background: var(--text-muted); opacity: 0.4; }

/* Paywall */
.paywall-divider { height: 1px; background: var(--border-light); margin: 4px 20px 24px; }
.paywall-text {
    text-align: center;
    padding: 0 24px;
    margin-bottom: 18px;
}
.paywall-headline {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    line-height: 1.3;
    margin-bottom: 6px;
}
.paywall-sub { font-size: 15px; color: var(--text-secondary); font-weight: 400; }
.btn-pay {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: calc(100% - 40px);
    margin: 0 20px;
    padding: 19px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(26,58,92,0.18);
    text-decoration: none;
}
.btn-pay:hover { background: var(--accent-hover); }
.pay-trust {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin: 10px 20px 0;
    font-size: 11px;
    color: var(--text-muted);
}
.other-job-btn {
    display: block;
    text-align: center;
    margin: 18px auto 0;
    font-size: 13px;
    color: var(--text-muted);
    background: none;
    border: none;
    font-family: var(--font);
    cursor: pointer;
    padding: 8px;
}
</style>
{% endblock %}

{% block body %}
<div class="container teaser-screen" id="teaserScreen">
    <div style="text-align:center;padding:80px 0;color:var(--text-muted);">Lade Ergebnis…</div>
</div>
{% endblock %}

{% block scripts %}
<script>
const wmResult = JSON.parse(sessionStorage.getItem('wm_result') || '{}');
const wmTraits = JSON.parse(sessionStorage.getItem('wm_traits') || '{}');
const wmInsight = sessionStorage.getItem('wm_insight') || '';
const selectedJob = JSON.parse(sessionStorage.getItem('wm_selected_job') || '{}');

initTeaser();

async function initTeaser() {
    if (!wmResult || !wmResult.scores) {
        document.getElementById('teaserScreen').innerHTML = `
            <div style="text-align:center;padding:80px 20px;">
                <p style="color:var(--text-muted);margin-bottom:24px;">Kein Ergebnis gefunden.</p>
                <a href="/assessment" class="btn btn-primary">Karriere-Check starten →</a>
            </div>`;
        return;
    }
    // Job-Fit ggf. frisch berechnen (mit Traits + gewählter Variante)
    const wmVariante = sessionStorage.getItem('wm_variante') || '';
    let fitData = JSON.parse(sessionStorage.getItem('wm_fit_result') || 'null');
    if (!fitData || fitData.job_name !== (selectedJob.name || fitData.job_name) || (fitData.variante || '') !== wmVariante) {
        const jn = selectedJob.name || 'dem Job';
        const loadMsgs = [
            `Ich gleiche dein Profil mit ${jn} ab…`,
            'Ich lese den echten Stellenmarkt…',
            'Ich prüfe, wo du stark bist…',
            'Gleich hast du\'s…'
        ];
        document.getElementById('teaserScreen').innerHTML = `
            <div style="text-align:center;padding:90px 20px;">
                <div class="loading-pulse" style="margin:0 auto 18px;"></div>
                <div id="tlText" style="font-size:15px;color:var(--text-secondary);">${loadMsgs[0]}</div>
            </div>`;
        let tli = 0;
        const tlIv = setInterval(() => { tli++; const el = document.getElementById('tlText'); if (el && tli < loadMsgs.length) el.textContent = loadMsgs[tli]; }, 2800);
        try {
            const ctrl = new AbortController();
            const to = setTimeout(() => ctrl.abort(), 50000);
            const resp = await fetch('/api/fit', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, signal: ctrl.signal,
                body: JSON.stringify({ job_name: selectedJob.name || 'Produktmanager', scores: wmResult.scores, code: wmResult.code || 'EA', trait_scores: wmTraits, variante: sessionStorage.getItem('wm_variante') || '' })
            });
            clearTimeout(to);
            const d = await resp.json();
            clearInterval(tlIv);
            if (d.error) throw new Error(d.error);
            fitData = { ...d, job_name: selectedJob.name || 'Produktmanager', match_pct: selectedJob.match || 0, variante: wmVariante };
            sessionStorage.setItem('wm_fit_result', JSON.stringify(fitData));
        } catch(e) {
            clearInterval(tlIv);
            console.error('[WM] fit error:', e);
            showFitError();
            return;
        }
    }
    try {
        renderTeaser(fitData, wmResult);
    } catch(e) {
        console.error('[WM] renderTeaser error:', e);
        showFitError();
    }
}

function showFitError() {
    document.getElementById('teaserScreen').innerHTML = `
        <div style="padding:90px 24px;text-align:center;">
            <div style="font-size:17px;font-weight:600;color:var(--text-primary);margin-bottom:8px;">Das hat gerade nicht geklappt.</div>
            <p style="color:var(--text-muted);font-size:14px;line-height:1.5;margin:0 0 24px;">Manchmal ist der Server kurz ausgelastet. Probier's einfach nochmal.</p>
            <button class="btn btn-primary" onclick="retryFit()">Nochmal versuchen →</button>
        </div>`;
}
function retryFit() {
    sessionStorage.removeItem('wm_fit_result');
    initTeaser();
}

function buildScoreArcSVG(score) {
    const R = 76, CX = 100, CY = 100;
    const START = 225, SWEEP = 270;
    function polar(deg) {
        const rad = (deg - 90) * Math.PI / 180;
        return [CX + R * Math.cos(rad), CY + R * Math.sin(rad)];
    }
    function arcPath(fromDeg, toDeg) {
        const [x1,y1] = polar(fromDeg);
        const [x2,y2] = polar(toDeg);
        const large = (toDeg - fromDeg) > 180 ? 1 : 0;
        return `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`;
    }
    const progress = Math.min(1, score / 100);
    const color = score >= 70 ? '#2D6A4F' : '#A86A2D';
    return `<svg width="200" height="200" viewBox="0 0 200 200" id="scoreArcSvg">
        <path d="${arcPath(START, START+SWEEP)}" fill="none" stroke="#EFEDE6" stroke-width="12" stroke-linecap="round"/>
        <path d="${arcPath(START, START+SWEEP*progress)}" id="arcFill" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round"/>
    </svg>`;
}

function animateArc(targetScore) {
    const SWEEP = 270;
    const R = 76, CX = 100, CY = 100, START = 225;
    function polar(deg) {
        const rad = (deg - 90) * Math.PI / 180;
        return [CX + R * Math.cos(rad), CY + R * Math.sin(rad)];
    }
    function arcPath(fromDeg, toDeg) {
        const [x1,y1] = polar(fromDeg);
        const [x2,y2] = polar(toDeg);
        const large = (toDeg - fromDeg) > 180 ? 1 : 0;
        return `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`;
    }
    const arcEl = document.getElementById('arcFill');
    const numEl = document.getElementById('scoreNumber');
    if (!arcEl || !numEl) return;
    const start = Date.now(), dur = 1400;
    function tick() {
        const e = Math.min(1, (Date.now()-start)/dur);
        const eased = 1 - Math.pow(1-e, 3);
        const current = Math.round(targetScore * eased);
        const progress = Math.min(1, current/100);
        arcEl.setAttribute('d', arcPath(START, START + SWEEP * progress));
        numEl.textContent = current;
        if (e < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
}

function blurCard(lines = 2) {
    const widths = ['92%','68%','80%','54%'];
    const bars = Array.from({length: lines}, (_, i) =>
        `<div class="blur-body-bar" style="width:${widths[i%widths.length]}"></div>`
    ).join('');
    return `<div class="blur-card"><div class="blur-inner">
        <div class="blur-title-bar"></div>${bars}
    </div></div>`;
}

function reqBadgeClass(badge) {
    return badge === 'passt_gut' ? 'req-badge--gut' : badge === 'dein_hebel' ? 'req-badge--hebel' : 'req-badge--basis';
}
function reqBadgeLabel(badge) {
    return badge === 'passt_gut' ? 'Passt gut' : badge === 'dein_hebel' ? 'Dein Hebel' : 'Solide Basis';
}

function renderMarktPanel(m) {
    if (!m || m.offene_stellen == null) return '';
    const ROUTE = '<circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/>';
    const PIN = '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>';
    const mRow = (icon, label, value, good) => `
        <div style="display:flex;align-items:center;gap:11px;padding:11px 12px;background:rgba(255,255,255,0.06);">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${icon}</svg>
            <span style="font-size:13px;color:rgba(255,255,255,0.7);flex:1;">${label}</span>
            <span style="font-size:13px;font-weight:500;color:${good?'#5EE0B0':'#fff'};text-align:right;">${value}</span>
        </div>`;
    const regions = (m.regionen || []).slice(0, 3).join(' · ');
    return `
    <div style="background:#141414;color:#fff;border-radius:18px;padding:20px;margin:4px 20px 28px;">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:4px;">
            <span style="width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,0.14);display:flex;align-items:center;justify-content:center;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 9l-5 5-3-3-4 4"/></svg>
            </span>
            <span style="font-size:10px;text-transform:uppercase;letter-spacing:0.14em;font-weight:500;color:rgba(255,255,255,0.7);">Echter Arbeitsmarkt</span>
        </div>
        <p style="font-size:11.5px;color:rgba(255,255,255,0.55);margin:0 0 16px;padding-left:35px;">Live-Daten der Bundesagentur für Arbeit</p>
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:18px;">
            <span style="font-size:40px;font-weight:600;line-height:1;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;">${Number(m.offene_stellen).toLocaleString('de-DE')}</span>
            <span style="font-size:14px;color:rgba(255,255,255,0.7);">offene Stellen gerade</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:1px;border-radius:14px;overflow:hidden;">
            ${mRow(ROUTE, 'Quereinstieg', m.quereinstieg_moeglich ? 'Möglich' : 'Eher selten', m.quereinstieg_moeglich)}
            ${regions ? mRow(PIN, 'Top-Regionen', regions) : ''}
        </div>
    </div>`;
}

function renderTeaser(data, wm) {
    const jobName = data.job_name || 'Produktmanager';
    const topKey = (wm.code || 'EA')[0];
    const tierColors = {R:'#475569',I:'#4338CA',A:'#F59E0B',S:'#0D9488',E:'#EA580C',C:'#7C3AED'};
    const tierColor = tierColors[topKey] || '#1A3A5C';
    const marktPanel = renderMarktPanel(data.markt);

    // Anforderungen: Name + Badge sichtbar, Begründung geblurrt (das Warum ist Premium)
    const reqs = (data.requirements || []).map(r => `
        <div class="req-card">
            <div class="req-head">
                <span class="req-name">${r.name}</span>
                <span class="req-badge ${reqBadgeClass(r.badge)}">${reqBadgeLabel(r.badge)}</span>
            </div>
            <div class="req-body-blur"><span style="width:92%"></span><span style="width:64%"></span></div>
        </div>`).join('');

    document.getElementById('teaserScreen').innerHTML = `
        <div class="teaser-logo-bar">
            <span style="display:inline-flex;align-items:center;gap:6px;font-size:15px;font-weight:600;color:var(--text-primary);">
                <span style="width:22px;height:22px;border-radius:50%;border:1.5px solid var(--text-primary);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;">M</span>
                Work Mentor
            </span>
        </div>

        ${wmInsight ? `<div style="margin:6px 20px 24px;padding:18px;background:var(--accent);color:#fff;border-radius:18px;position:relative;overflow:hidden;">
            <div style="position:absolute;top:-12px;right:-8px;opacity:0.14;"><svg width="84" height="84" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.4"><path d="M12 3l1.9 5.8a2 2 0 0 0 1.3 1.3L21 12l-5.8 1.9a2 2 0 0 0-1.3 1.3L12 21l-1.9-5.8a2 2 0 0 0-1.3-1.3L3 12l5.8-1.9a2 2 0 0 0 1.3-1.3z"/></svg></div>
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:rgba(255,255,255,0.7);margin-bottom:8px;position:relative;">Das bist du</div>
            <div style="font-size:18px;line-height:1.35;color:#fff;font-weight:500;position:relative;">${wmInsight}</div>
        </div>` : ''}

        <div class="teaser-context">${jobName} · Dein Fit</div>

        <div class="score-arc-wrap">
            ${buildScoreArcSVG(0)}
            <div class="score-arc-inner">
                <div class="score-number"><span id="scoreNumber">0</span><span class="score-pct">%</span></div>
                <div class="score-label">FIT</div>
            </div>
        </div>

        <p class="fit-headline" style="color:var(--text-primary);font-size:18px;font-weight:600;">${data.fit_headline || 'Vieles passt schon — und es gibt einen klaren Punkt zum Anpacken.'}</p>

        ${marktPanel}

        <div class="teaser-section-head">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            <span class="teaser-section-label" style="color:var(--accent);">Das braucht ${jobName}</span>
        </div>
        <div class="teaser-cards">${reqs}</div>

        <div class="paywall-divider"></div>

        <div class="paywall-text">
            <div class="paywall-headline">8 Minuten investiert.</div>
            <div class="paywall-sub">Dein vollständiges Ergebnis ist fertig.</div>
        </div>

        <a href="/premium" class="btn-pay">
            Vollständiges Ergebnis — 20 €
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>

        <div class="pay-trust">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Einmalzahlung · Kein Abo
        </div>

        <button class="other-job-btn" onclick="window.location.href='/jobs'">Anderen Job testen</button>
    `;

    animateArc(data.fit_score || 67);
}
</script>
{% endblock %}
